# Release workflow.
#
# Behavior:
#   - Versioned tag pushes (`v*.*.*`) publish changelog-backed releases.
#   - Plain pushes to `main` run CI only; release cards stay semver-readable.
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          set -eu

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TITLE="${TAG}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          # Pull the [<version>] block out of CHANGELOG.md (everything between
          # `## [<version>]` and the next `## [` heading, exclusive).
          if grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            awk -v v="${VERSION}" '
              $0 ~ "^## \\["v"\\]" { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md > "$NOTES_FILE"
          else
            printf 'No CHANGELOG.md entry for [%s]; using auto notes only.\n' "$VERSION" > "$NOTES_FILE"
          fi

          # Append auto-generated commit log since the previous version tag.
          PREV_TAG="$(git tag --sort=-v:refname | grep '^v' | grep -v "^${TAG}$" | head -n 1 || true)"
          if [ -n "$PREV_TAG" ]; then
            {
              printf '\n\n---\n\n### Commits since %s\n\n' "$PREV_TAG"
              git log --pretty=format:'- %s (%h)' "$PREV_TAG..$TAG"
              printf '\n'
            } >> "$NOTES_FILE"
          fi

          {
            printf 'tag=%s\n' "$TAG"
            printf 'title=%s\n' "$TITLE"
            printf 'notes_file=%s\n' "$NOTES_FILE"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -eu
          TAG="${{ steps.notes.outputs.tag }}"
          TITLE="${{ steps.notes.outputs.title }}"
          NOTES_FILE="${{ steps.notes.outputs.notes_file }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE"
          fi
