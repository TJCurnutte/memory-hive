# CI for memory-hive. Runs shellcheck and install smoke tests on Ubuntu
# and macOS. Keep this workflow lean: raw shell only, no third-party
# actions beyond checkout@v4.
name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
    branches:
      - main
      - feat/**

jobs:
  smoke:
    name: shellcheck + install smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # shellcheck ships via brew on the macOS runner image. Check first
          # so we don't re-run brew every job.
          if ! command -v shellcheck >/dev/null 2>&1; then
            brew install shellcheck
          fi

      - name: Install shellcheck (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y shellcheck
          fi

      - name: Shellcheck (warn-level, do not fail build)
        shell: bash
        run: |
          # Pre-existing findings are acceptable; we still want to record
          # them. Keep output as annotations but do not fail the build.
          set +e
          mkdir -p ci-artifacts
          shellcheck --format=gcc install.sh create-agent.sh memory-hive update.sh check-compliance.sh \
            | tee ci-artifacts/shellcheck.txt
          SC_RC=${PIPESTATUS[0]}
          echo "shellcheck exit: $SC_RC" >> ci-artifacts/shellcheck.txt
          exit 0

      - name: Upload shellcheck artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shellcheck-${{ matrix.os }}
          path: ci-artifacts/shellcheck.txt
          if-no-files-found: ignore

      - name: Non-interactive install smoke test
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null
          # The installer MUST create the main silo on a clean install.
          test -d "$INSTALL_DIR/hive/agents/main"
          test -f "$INSTALL_DIR/hive/agents/main/log.md"
          test -f "$INSTALL_DIR/hive/agents/main/context.md"
          test -f "$INSTALL_DIR/hive/agents/main/memory.md"
          echo "Non-interactive install OK"

      - name: Interactive install smoke test (heredoc wizard)
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          # Wizard is opt-in — must set MEMORY_HIVE_WIZARD=1 for the heredoc
          # to be consumed. Without the flag the installer correctly runs
          # silent (covered by the non-interactive test above).
          export MEMORY_HIVE_WIZARD=1
          # Drive the wizard: 2 agents, "foo" (confirm y, role 1 = coder),
          # "bar" (confirm y, role 3 = researcher).
          sh install.sh <<'WIZARD'
          2
          foo
          y
          1
          bar
          y
          3
          WIZARD
          test -d "$INSTALL_DIR/hive/agents/main"
          test -d "$INSTALL_DIR/hive/agents/foo"
          test -d "$INSTALL_DIR/hive/agents/bar"
          # foo was created with role 1 (coder) — the template says "Writes and edits code".
          grep -q "Writes and edits code" "$INSTALL_DIR/hive/agents/foo/context.md"
          echo "Interactive install OK"

      - name: CLI smoke — add / list / register
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null

          # add testagent with the writer template.
          sh "$INSTALL_DIR/memory-hive" add testagent --role writer
          test -d "$INSTALL_DIR/hive/agents/testagent"
          grep -q "Drafts and edits prose" "$INSTALL_DIR/hive/agents/testagent/context.md"

          # list must print testagent.
          sh "$INSTALL_DIR/memory-hive" list | tee /tmp/mh-list.out
          grep -q '^ *testagent' /tmp/mh-list.out

          # register must succeed and keep registry in sync.
          sh "$INSTALL_DIR/memory-hive" register
          grep -q "testagent" "$INSTALL_DIR/hive/registry/AGENTS.md"

          # doctor should exit 0 (CLAUDE.md absent in CI => skipped, not warning).
          sh "$INSTALL_DIR/memory-hive" doctor
          echo "CLI smoke OK"

      - name: CLI smoke — promote
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null

          # Seed a raw learning under hive/learnings/raw/<agent>/.
          # Heredoc bodies are dedented via sed because YAML's `run: |` block
          # forces leading indentation; without dedent the markdown frontmatter
          # would not start at column 0.
          mkdir -p "$INSTALL_DIR/hive/learnings/raw/coder"
          sed 's/^          //' > "$INSTALL_DIR/hive/learnings/raw/coder/2026-04-23-test-isolation.md" <<'RAW'
          ---
          date: 2026-04-23
          agent: coder
          context: parallel test workers leak DB state
          ---

          # Test isolation across parallel workers

          ## What happened

          Intermittent failures only under 4+ workers.

          ## Generalizable rule

          Shared test fixtures must not mutate state. Anything that writes
          to a DB, filesystem, or mutable global should be function-scoped.
          RAW

          # Promote it. Default --into infers patterns.md.
          sh "$INSTALL_DIR/memory-hive" promote \
              hive/learnings/raw/coder/2026-04-23-test-isolation.md \
              | tee /tmp/mh-promote.out

          # Distilled must contain the new section + a backlink.
          DISTILLED="$INSTALL_DIR/hive/learnings/distilled/patterns.md"
          test -f "$DISTILLED"
          grep -q "## Test isolation across parallel workers" "$DISTILLED"
          grep -q "../raw/coder/2026-04-23-test-isolation.md" "$DISTILLED"
          grep -q "Contributing agent:.*coder" "$DISTILLED"

          # DECISIONS.md must record the promotion.
          DEC="$INSTALL_DIR/hive/curator/DECISIONS.md"
          test -f "$DEC"
          grep -q "Promoted .learnings/raw/coder/2026-04-23-test-isolation.md" "$DEC"

          # Raw file must be untouched (source of truth).
          grep -q "## Generalizable rule" \
              "$INSTALL_DIR/hive/learnings/raw/coder/2026-04-23-test-isolation.md"

          # --dry-run must not write.
          mkdir -p "$INSTALL_DIR/hive/learnings/raw/coder"
          sed 's/^          //' > "$INSTALL_DIR/hive/learnings/raw/coder/dry.md" <<'RAW'
          ---
          date: 2026-04-23
          agent: coder
          context: dry-run check
          ---

          # Dry run check
          RAW
          BEFORE_BYTES="$(wc -c < "$DISTILLED")"
          sh "$INSTALL_DIR/memory-hive" promote \
              hive/learnings/raw/coder/dry.md --dry-run > /dev/null
          AFTER_BYTES="$(wc -c < "$DISTILLED")"
          [ "$BEFORE_BYTES" = "$AFTER_BYTES" ] || \
              { echo "FAIL: --dry-run wrote to distilled"; exit 1; }

          # Refuses paths outside learnings/raw/.
          mkdir -p "$INSTALL_DIR/outside"
          sed 's/^          //' > "$INSTALL_DIR/outside/x.md" <<'RAW'
          ---
          date: 2026-04-23
          agent: coder
          context: should refuse
          ---

          # Outside
          RAW
          if sh "$INSTALL_DIR/memory-hive" promote \
              "$INSTALL_DIR/outside/x.md" > /dev/null 2>&1; then
              echo "FAIL: promote did not refuse outside path"
              exit 1
          fi

          # Refuses missing frontmatter.
          echo "no frontmatter" > "$INSTALL_DIR/hive/learnings/raw/coder/bad.md"
          if sh "$INSTALL_DIR/memory-hive" promote \
              hive/learnings/raw/coder/bad.md > /dev/null 2>&1; then
              echo "FAIL: promote did not refuse missing frontmatter"
              exit 1
          fi

          # --into honors explicit target.
          sed 's/^          //' > "$INSTALL_DIR/hive/learnings/raw/coder/win.md" <<'RAW'
          ---
          date: 2026-04-23
          agent: coder
          context: shipped a feature
          ---

          # Shipped a feature

          It works.
          RAW
          sh "$INSTALL_DIR/memory-hive" promote \
              hive/learnings/raw/coder/win.md --into wins.md > /dev/null
          grep -q "## Shipped a feature" "$INSTALL_DIR/hive/learnings/distilled/wins.md"

          echo "Promote smoke OK"

      - name: Platform integration smoke — auto-inject
        shell: bash
        run: |
          set -eu
          # Fake a clean HOME so we don't touch the runner's real dotfiles.
          FAKE_HOME="$(mktemp -d)"
          INSTALL_DIR="$(mktemp -d)"
          export HOME="$FAKE_HOME"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_REPO="$(pwd)"

          # Seed every auto-inject platform's marker dir. Order matches
          # the platform table in install.sh.
          for dir in \
              .claude .openclaw \
              .config/nanoclaw .hermes \
              .cursor .continue .gemini \
              .config/goose .aws/amazonq .openhands \
              .roo .kilocode .codeium/windsurf \
              .warp .config/amp .codex .config/opencode; do
              mkdir -p "$FAKE_HOME/$dir"
          done
          # And a couple of manual-only markers so we can see them reported.
          mkdir -p "$FAKE_HOME/.cline" "$FAKE_HOME/.config/zed"

          sh install.sh < /dev/null > /tmp/mh-plat.log 2>&1

          # Assert: every auto-inject target file was written with the markers.
          fail=0
          for rel in \
              .claude/CLAUDE.md \
              .openclaw/CLAUDE.md \
              .config/nanoclaw/AGENTS.md \
              .hermes/memories/MEMORY.md \
              .cursor/rules/memory-hive.mdc \
              .continue/rules/memory-hive.md \
              .gemini/GEMINI.md \
              .goosehints \
              .aws/amazonq/rules/memory-hive.md \
              .openhands/microagents/memory-hive.md \
              .roo/rules/memory-hive.md \
              .kilocode/rules/memory-hive.md \
              .codeium/windsurf/memories/global_rules.md \
              .agents/AGENTS.md \
              .config/amp/AGENTS.md \
              .codex/AGENTS.md \
              .config/opencode/AGENTS.md; do
              if [ ! -f "$FAKE_HOME/$rel" ]; then
                  echo "MISSING: $rel" >&2
                  fail=1
              elif ! grep -q "memory-hive:start" "$FAKE_HOME/$rel"; then
                  echo "NO MARKERS: $rel" >&2
                  fail=1
              elif ! grep -q "$INSTALL_DIR" "$FAKE_HOME/$rel"; then
                  echo "WRONG INSTALL_DIR: $rel" >&2
                  fail=1
              fi
          done

          # Manual platforms should appear in the banner without writing files.
          grep -q "\[manual\] Cline" /tmp/mh-plat.log || { echo "Cline not reported as manual"; fail=1; }
          grep -q "\[manual\] Zed"   /tmp/mh-plat.log || { echo "Zed not reported as manual";   fail=1; }
          test ! -f "$FAKE_HOME/.cline/memory-hive.md" || { echo "Cline wrote a file (shouldn't)"; fail=1; }

          [ "$fail" -eq 0 ] || exit 1
          echo "Platform integration smoke OK"

      - name: Platform integration smoke — opt-out
        shell: bash
        run: |
          set -eu
          FAKE_HOME="$(mktemp -d)"
          INSTALL_DIR="$(mktemp -d)"
          export HOME="$FAKE_HOME"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_REPO="$(pwd)"

          mkdir -p "$FAKE_HOME/.cursor" "$FAKE_HOME/.gemini"
          # Opt out of Cursor; Gemini should still be wired.
          export MEMORY_HIVE_SKIP_CURSOR=1
          sh install.sh < /dev/null > /tmp/mh-optout.log 2>&1

          test ! -f "$FAKE_HOME/.cursor/rules/memory-hive.mdc" || \
              { echo "Cursor was wired despite skip env var"; exit 1; }
          test -f "$FAKE_HOME/.gemini/GEMINI.md" || \
              { echo "Gemini CLI was NOT wired"; exit 1; }
          grep -q "\[skip \] Cursor" /tmp/mh-optout.log || \
              { echo "Cursor skip not reported"; exit 1; }
          echo "Opt-out smoke OK"

      - name: Platform integration smoke — idempotent
        shell: bash
        run: |
          set -eu
          FAKE_HOME="$(mktemp -d)"
          INSTALL_DIR="$(mktemp -d)"
          export HOME="$FAKE_HOME"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_REPO="$(pwd)"

          mkdir -p "$FAKE_HOME/.cursor"
          sh install.sh < /dev/null > /dev/null 2>&1
          checksum_1=$(cksum "$FAKE_HOME/.cursor/rules/memory-hive.mdc" | awk '{print $1}')

          sh install.sh < /dev/null > /dev/null 2>&1
          checksum_2=$(cksum "$FAKE_HOME/.cursor/rules/memory-hive.mdc" | awk '{print $1}')

          [ "$checksum_1" = "$checksum_2" ] || \
              { echo "Re-install changed the managed block (not idempotent)"; exit 1; }
          echo "Idempotency smoke OK"

      - name: CLI smoke — tail
      - name: Confidence smoke — upgrade suggestion appears
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null

          # Need a non-main agent so log.md writes classify cleanly.
          sh "$INSTALL_DIR/memory-hive" add coder --role coder > /dev/null

          # Sleep before the first seeded write so both files are strictly
          # newer than the install baseline marker (otherwise mh_tail filters
          # them out as install-time scaffolding).
          sleep 2

          # Seed two writes with distinct mtimes. The newer one (DECISIONS.md)
          # must appear FIRST in tail output, with its content extracted.
          # Use printf instead of a heredoc so YAML's literal-block indentation
          # does not bleed into the file content (would break `^## ` matches).
          mkdir -p "$INSTALL_DIR/hive/curator"
          printf '# coder — log\n\n## 2026-04-24\n\n- Older entry seeded by tail smoke test.\n' \
              > "$INSTALL_DIR/hive/agents/coder/log.md"
          sleep 2
          printf '# Decisions\n\n## 2026-04-24 — Newer entry seeded by tail smoke test\n\nRationale line for the smoke test extractor.\n' \
              > "$INSTALL_DIR/hive/curator/DECISIONS.md"

          # Run tail and snapshot output.
          sh "$INSTALL_DIR/memory-hive" tail -n 5 > /tmp/mh-tail.out
          cat /tmp/mh-tail.out

          # Newer write (DECISIONS) must appear before older (log.md) in output.
          dec_line=$(grep -n "DECISIONS.md" /tmp/mh-tail.out | head -1 | cut -d: -f1)
          log_line=$(grep -n "log.md" /tmp/mh-tail.out | head -1 | cut -d: -f1)
          [ -n "$dec_line" ] || { echo "DECISIONS.md not in tail output"; exit 1; }
          [ -n "$log_line" ] || { echo "log.md not in tail output"; exit 1; }
          [ "$dec_line" -lt "$log_line" ] || \
            { echo "Order wrong: DECISIONS at $dec_line, log at $log_line"; exit 1; }

          # Content extraction: dated heading + paragraph must show up.
          grep -q "Newer entry seeded by tail smoke test" /tmp/mh-tail.out || \
            { echo "DECISIONS heading text missing"; exit 1; }
          grep -q "Rationale line for the smoke test extractor" /tmp/mh-tail.out || \
            { echo "DECISIONS body text missing"; exit 1; }
          grep -q "Older entry seeded by tail smoke test" /tmp/mh-tail.out || \
            { echo "log.md body missing"; exit 1; }

          # --silo filter: only coder writes.
          sh "$INSTALL_DIR/memory-hive" tail --silo coder > /tmp/mh-tail-silo.out
          grep -q "agents/coder/log.md" /tmp/mh-tail-silo.out || \
            { echo "--silo coder did not include coder log"; exit 1; }
          ! grep -q "curator/DECISIONS.md" /tmp/mh-tail-silo.out || \
            { echo "--silo coder leaked curator file"; exit 1; }

          # --since filter (today): both writes today, both should show.
          today=$(date +%Y-%m-%d)
          sh "$INSTALL_DIR/memory-hive" tail --since "$today" > /tmp/mh-tail-since.out
          grep -q "DECISIONS.md" /tmp/mh-tail-since.out
          grep -q "log.md"       /tmp/mh-tail-since.out

          # Bad flags must error non-zero.
          set +e
          sh "$INSTALL_DIR/memory-hive" tail -n abc > /dev/null 2>&1
          rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "Bad -n value should error"; exit 1; }

          set +e
          sh "$INSTALL_DIR/memory-hive" tail --since 2026/04/24 > /dev/null 2>&1
          rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "Bad --since format should error"; exit 1; }

          # help text mentions tail.
          sh "$INSTALL_DIR/memory-hive" help | grep -q "memory-hive tail" || \
            { echo "help missing tail entry"; exit 1; }

          echo "Tail CLI smoke OK"
          # Seed three raw learnings under three different agents, all
          # `confidence: low`, all with the same first-H1 (modulo
          # capitalization/punctuation — the normalizer should fold them).
          RAW="$INSTALL_DIR/hive/learnings/raw"
          mkdir -p "$RAW/coder" "$RAW/reviewer" "$RAW/researcher"

          cat > "$RAW/coder/2026-04-23-test-isolation.md" <<'EOF'
          ---
          date: 2026-04-23
          agent: coder
          context: parallel test workers leak DB state
          confidence: low
          ---

          # Test isolation parallel

          Function-scoped fixtures fix it.
          EOF

          cat > "$RAW/reviewer/2026-04-24-flaky-tests.md" <<'EOF'
          ---
          date: 2026-04-24
          agent: reviewer
          context: flaky tests under -n auto
          confidence: low
          ---

          # Test Isolation, Parallel!

          Saw the same flake elsewhere.
          EOF

          cat > "$RAW/researcher/2026-04-24-parallel-fix.md" <<'EOF'
          ---
          date: 2026-04-24
          agent: researcher
          context: parallel fix
          confidence: low
          ---

          # test-isolation parallel

          Confirmed across repos.
          EOF

          # Also seed one file with no frontmatter so we can check the
          # lint-warning surface.
          cat > "$RAW/coder/2026-04-25-no-fm.md" <<'EOF'
          # No frontmatter

          This file should be flagged for lint.
          EOF

          OUT="$(sh "$INSTALL_DIR/memory-hive" confidence)"
          printf '%s\n' "$OUT" > /tmp/mh-conf.out
          cat /tmp/mh-conf.out

          # Required assertions:
          #   - cluster header references the (raw) title
          #   - upgrade suggestion line is present
          #   - the rule citation matches HIVE_ARCHITECTURE
          #   - all three seed files appear in the Files list
          #   - the no-frontmatter file is reported as needing lint
          grep -q "Test isolation parallel" /tmp/mh-conf.out
          grep -q "3 low" /tmp/mh-conf.out
          grep -q "UPGRADE TO MEDIUM" /tmp/mh-conf.out
          grep -q "3 aligned low" /tmp/mh-conf.out
          grep -q "coder/2026-04-23-test-isolation.md" /tmp/mh-conf.out
          grep -q "reviewer/2026-04-24-flaky-tests.md" /tmp/mh-conf.out
          grep -q "researcher/2026-04-24-parallel-fix.md" /tmp/mh-conf.out
          grep -q "2026-04-25-no-fm.md" /tmp/mh-conf.out
          grep -q "Summary: 1 cluster" /tmp/mh-conf.out

          # Help also references the verb.
          sh "$INSTALL_DIR/memory-hive" help | grep -q "memory-hive confidence"
          echo "Confidence smoke OK"

      - name: Doctor smoke — multi-platform health check
        shell: bash
        run: |
          set -eu
          FAKE_HOME="$(mktemp -d)"
          INSTALL_DIR="$(mktemp -d)"
          export HOME="$FAKE_HOME"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_REPO="$(pwd)"

          mkdir -p "$FAKE_HOME/.claude" "$FAKE_HOME/.cursor"
          sh install.sh < /dev/null > /dev/null 2>&1

          # Happy path: doctor clean.
          sh "$INSTALL_DIR/memory-hive" doctor > /tmp/mh-doc.log 2>&1
          grep -q "Claude Code block points at this install" /tmp/mh-doc.log
          grep -q "Cursor block points at this install" /tmp/mh-doc.log

          # Corrupt Cursor's block to point at a wrong install; doctor should warn.
          sed -i.bak "s|$INSTALL_DIR|/wrong/path|g" "$FAKE_HOME/.cursor/rules/memory-hive.mdc"
          set +e
          sh "$INSTALL_DIR/memory-hive" doctor > /tmp/mh-doc2.log 2>&1
          rc=$?
          set -e
          [ "$rc" -eq 1 ] || { echo "Doctor should exit 1 after corruption, got $rc"; exit 1; }
          grep -q "Cursor block does not reference" /tmp/mh-doc2.log || \
              { echo "Doctor did not flag Cursor drift"; exit 1; }
          echo "Doctor multi-platform smoke OK"
