# CI for memory-hive. Runs shellcheck and install smoke tests on Ubuntu
# and macOS. Keep this workflow lean: raw shell only, no third-party
# actions beyond checkout@v4.
name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
    branches:
      - main
      - feat/**

jobs:
  smoke:
    name: shellcheck + install smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # shellcheck ships via brew on the macOS runner image. Check first
          # so we don't re-run brew every job.
          if ! command -v shellcheck >/dev/null 2>&1; then
            brew install shellcheck
          fi

      - name: Install shellcheck (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y shellcheck
          fi

      - name: Shellcheck (warn-level, do not fail build)
        shell: bash
        run: |
          # Pre-existing findings are acceptable; we still want to record
          # them. Keep output as annotations but do not fail the build.
          set +e
          mkdir -p ci-artifacts
          shellcheck --format=gcc install.sh create-agent.sh memory-hive update.sh check-compliance.sh \
            | tee ci-artifacts/shellcheck.txt
          SC_RC=${PIPESTATUS[0]}
          echo "shellcheck exit: $SC_RC" >> ci-artifacts/shellcheck.txt
          exit 0

      - name: Upload shellcheck artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shellcheck-${{ matrix.os }}
          path: ci-artifacts/shellcheck.txt
          if-no-files-found: ignore

      - name: Non-interactive install smoke test
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null
          # The installer MUST create the main silo on a clean install.
          test -d "$INSTALL_DIR/hive/agents/main"
          test -f "$INSTALL_DIR/hive/agents/main/log.md"
          test -f "$INSTALL_DIR/hive/agents/main/context.md"
          test -f "$INSTALL_DIR/hive/agents/main/memory.md"
          echo "Non-interactive install OK"

      - name: Interactive install smoke test (heredoc wizard)
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          # Wizard is opt-in — must set MEMORY_HIVE_WIZARD=1 for the heredoc
          # to be consumed. Without the flag the installer correctly runs
          # silent (covered by the non-interactive test above).
          export MEMORY_HIVE_WIZARD=1
          # Drive the wizard: 2 agents, "foo" (confirm y, role 1 = coder),
          # "bar" (confirm y, role 3 = researcher).
          sh install.sh <<'WIZARD'
          2
          foo
          y
          1
          bar
          y
          3
          WIZARD
          test -d "$INSTALL_DIR/hive/agents/main"
          test -d "$INSTALL_DIR/hive/agents/foo"
          test -d "$INSTALL_DIR/hive/agents/bar"
          # foo was created with role 1 (coder) — the template says "Writes and edits code".
          grep -q "Writes and edits code" "$INSTALL_DIR/hive/agents/foo/context.md"
          echo "Interactive install OK"

      - name: CLI smoke — add / list / register
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null

          # add testagent with the writer template.
          sh "$INSTALL_DIR/memory-hive" add testagent --role writer
          test -d "$INSTALL_DIR/hive/agents/testagent"
          grep -q "Drafts and edits prose" "$INSTALL_DIR/hive/agents/testagent/context.md"

          # list must print testagent.
          sh "$INSTALL_DIR/memory-hive" list | tee /tmp/mh-list.out
          grep -q '^ *testagent' /tmp/mh-list.out

          # register must succeed and keep registry in sync.
          sh "$INSTALL_DIR/memory-hive" register
          grep -q "testagent" "$INSTALL_DIR/hive/registry/AGENTS.md"

          # doctor should exit 0 (CLAUDE.md absent in CI => skipped, not warning).
          sh "$INSTALL_DIR/memory-hive" doctor
          echo "CLI smoke OK"

      - name: CLI smoke — promote
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null

          # Seed a raw learning under hive/learnings/raw/<agent>/.
          # Heredoc bodies are dedented via sed because YAML's `run: |` block
          # forces leading indentation; without dedent the markdown frontmatter
          # would not start at column 0.
          mkdir -p "$INSTALL_DIR/hive/learnings/raw/coder"
          sed 's/^          //' > "$INSTALL_DIR/hive/learnings/raw/coder/2026-04-23-test-isolation.md" <<'RAW'
          ---
          date: 2026-04-23
          agent: coder
          context: parallel test workers leak DB state
          ---

          # Test isolation across parallel workers

          ## What happened

          Intermittent failures only under 4+ workers.

          ## Generalizable rule

          Shared test fixtures must not mutate state. Anything that writes
          to a DB, filesystem, or mutable global should be function-scoped.
          RAW

          # Promote it. Default --into infers patterns.md.
          sh "$INSTALL_DIR/memory-hive" promote \
              hive/learnings/raw/coder/2026-04-23-test-isolation.md \
              | tee /tmp/mh-promote.out

          # Distilled must contain the new section + a backlink.
          DISTILLED="$INSTALL_DIR/hive/learnings/distilled/patterns.md"
          test -f "$DISTILLED"
          grep -q "## Test isolation across parallel workers" "$DISTILLED"
          grep -q "../raw/coder/2026-04-23-test-isolation.md" "$DISTILLED"
          grep -q "Contributing agent:.*coder" "$DISTILLED"

          # DECISIONS.md must record the promotion.
          DEC="$INSTALL_DIR/hive/curator/DECISIONS.md"
          test -f "$DEC"
          grep -q "Promoted .learnings/raw/coder/2026-04-23-test-isolation.md" "$DEC"

          # Raw file must be untouched (source of truth).
          grep -q "## Generalizable rule" \
              "$INSTALL_DIR/hive/learnings/raw/coder/2026-04-23-test-isolation.md"

          # --dry-run must not write.
          mkdir -p "$INSTALL_DIR/hive/learnings/raw/coder"
          sed 's/^          //' > "$INSTALL_DIR/hive/learnings/raw/coder/dry.md" <<'RAW'
          ---
          date: 2026-04-23
          agent: coder
          context: dry-run check
          ---

          # Dry run check
          RAW
          BEFORE_BYTES="$(wc -c < "$DISTILLED")"
          sh "$INSTALL_DIR/memory-hive" promote \
              hive/learnings/raw/coder/dry.md --dry-run > /dev/null
          AFTER_BYTES="$(wc -c < "$DISTILLED")"
          [ "$BEFORE_BYTES" = "$AFTER_BYTES" ] || \
              { echo "FAIL: --dry-run wrote to distilled"; exit 1; }

          # Refuses paths outside learnings/raw/.
          mkdir -p "$INSTALL_DIR/outside"
          sed 's/^          //' > "$INSTALL_DIR/outside/x.md" <<'RAW'
          ---
          date: 2026-04-23
          agent: coder
          context: should refuse
          ---

          # Outside
          RAW
          if sh "$INSTALL_DIR/memory-hive" promote \
              "$INSTALL_DIR/outside/x.md" > /dev/null 2>&1; then
              echo "FAIL: promote did not refuse outside path"
              exit 1
          fi

          # Refuses missing frontmatter.
          echo "no frontmatter" > "$INSTALL_DIR/hive/learnings/raw/coder/bad.md"
          if sh "$INSTALL_DIR/memory-hive" promote \
              hive/learnings/raw/coder/bad.md > /dev/null 2>&1; then
              echo "FAIL: promote did not refuse missing frontmatter"
              exit 1
          fi

          # --into honors explicit target.
          sed 's/^          //' > "$INSTALL_DIR/hive/learnings/raw/coder/win.md" <<'RAW'
          ---
          date: 2026-04-23
          agent: coder
          context: shipped a feature
          ---

          # Shipped a feature

          It works.
          RAW
          sh "$INSTALL_DIR/memory-hive" promote \
              hive/learnings/raw/coder/win.md --into wins.md > /dev/null
          grep -q "## Shipped a feature" "$INSTALL_DIR/hive/learnings/distilled/wins.md"

          echo "Promote smoke OK"

      - name: Platform integration smoke — auto-inject
        shell: bash
        run: |
          set -eu
          # Fake a clean HOME so we don't touch the runner's real dotfiles.
          FAKE_HOME="$(mktemp -d)"
          INSTALL_DIR="$(mktemp -d)"
          export HOME="$FAKE_HOME"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_REPO="$(pwd)"

          # Seed every auto-inject platform's marker dir. Order matches
          # the platform table in install.sh.
          for dir in \
              .claude .openclaw \
              .config/nanoclaw .hermes \
              .cursor .continue .gemini \
              .config/goose .aws/amazonq .openhands \
              .roo .kilocode .codeium/windsurf \
              .warp .config/amp .codex .config/opencode; do
              mkdir -p "$FAKE_HOME/$dir"
          done
          # And a couple of manual-only markers so we can see them reported.
          mkdir -p "$FAKE_HOME/.cline" "$FAKE_HOME/.config/zed"

          sh install.sh < /dev/null > /tmp/mh-plat.log 2>&1

          # Assert: every auto-inject target file was written with the markers.
          fail=0
          for rel in \
              .claude/CLAUDE.md \
              .openclaw/CLAUDE.md \
              .config/nanoclaw/AGENTS.md \
              .hermes/memories/MEMORY.md \
              .cursor/rules/memory-hive.mdc \
              .continue/rules/memory-hive.md \
              .gemini/GEMINI.md \
              .goosehints \
              .aws/amazonq/rules/memory-hive.md \
              .openhands/microagents/memory-hive.md \
              .roo/rules/memory-hive.md \
              .kilocode/rules/memory-hive.md \
              .codeium/windsurf/memories/global_rules.md \
              .agents/AGENTS.md \
              .config/amp/AGENTS.md \
              .codex/AGENTS.md \
              .config/opencode/AGENTS.md; do
              if [ ! -f "$FAKE_HOME/$rel" ]; then
                  echo "MISSING: $rel" >&2
                  fail=1
              elif ! grep -q "memory-hive:start" "$FAKE_HOME/$rel"; then
                  echo "NO MARKERS: $rel" >&2
                  fail=1
              elif ! grep -q "$INSTALL_DIR" "$FAKE_HOME/$rel"; then
                  echo "WRONG INSTALL_DIR: $rel" >&2
                  fail=1
              fi
          done

          # Manual platforms should appear in the banner without writing files.
          grep -q "\[manual\] Cline" /tmp/mh-plat.log || { echo "Cline not reported as manual"; fail=1; }
          grep -q "\[manual\] Zed"   /tmp/mh-plat.log || { echo "Zed not reported as manual";   fail=1; }
          test ! -f "$FAKE_HOME/.cline/memory-hive.md" || { echo "Cline wrote a file (shouldn't)"; fail=1; }

          [ "$fail" -eq 0 ] || exit 1
          echo "Platform integration smoke OK"

      - name: Platform integration smoke — opt-out
        shell: bash
        run: |
          set -eu
          FAKE_HOME="$(mktemp -d)"
          INSTALL_DIR="$(mktemp -d)"
          export HOME="$FAKE_HOME"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_REPO="$(pwd)"

          mkdir -p "$FAKE_HOME/.cursor" "$FAKE_HOME/.gemini"
          # Opt out of Cursor; Gemini should still be wired.
          export MEMORY_HIVE_SKIP_CURSOR=1
          sh install.sh < /dev/null > /tmp/mh-optout.log 2>&1

          test ! -f "$FAKE_HOME/.cursor/rules/memory-hive.mdc" || \
              { echo "Cursor was wired despite skip env var"; exit 1; }
          test -f "$FAKE_HOME/.gemini/GEMINI.md" || \
              { echo "Gemini CLI was NOT wired"; exit 1; }
          grep -q "\[skip \] Cursor" /tmp/mh-optout.log || \
              { echo "Cursor skip not reported"; exit 1; }
          echo "Opt-out smoke OK"

      - name: Platform integration smoke — idempotent
        shell: bash
        run: |
          set -eu
          FAKE_HOME="$(mktemp -d)"
          INSTALL_DIR="$(mktemp -d)"
          export HOME="$FAKE_HOME"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_REPO="$(pwd)"

          mkdir -p "$FAKE_HOME/.cursor"
          sh install.sh < /dev/null > /dev/null 2>&1
          checksum_1=$(cksum "$FAKE_HOME/.cursor/rules/memory-hive.mdc" | awk '{print $1}')

          sh install.sh < /dev/null > /dev/null 2>&1
          checksum_2=$(cksum "$FAKE_HOME/.cursor/rules/memory-hive.mdc" | awk '{print $1}')

          [ "$checksum_1" = "$checksum_2" ] || \
              { echo "Re-install changed the managed block (not idempotent)"; exit 1; }
          echo "Idempotency smoke OK"

      - name: CLI smoke — tail + confidence
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null

          # Need a non-main agent so log.md writes classify cleanly.
          sh "$INSTALL_DIR/memory-hive" add coder --role coder > /dev/null

          # Sleep before the first seeded write so both files are strictly
          # newer than the install baseline marker (otherwise mh_tail filters
          # them out as install-time scaffolding).
          sleep 2

          # Seed two writes with distinct mtimes. The newer one (DECISIONS.md)
          # must appear FIRST in tail output, with its content extracted.
          # Use printf instead of a heredoc so YAML's literal-block indentation
          # does not bleed into the file content (would break `^## ` matches).
          mkdir -p "$INSTALL_DIR/hive/curator"
          printf '# coder — log\n\n## 2026-04-24\n\n- Older entry seeded by tail smoke test.\n' \
              > "$INSTALL_DIR/hive/agents/coder/log.md"
          sleep 2
          printf '# Decisions\n\n## 2026-04-24 — Newer entry seeded by tail smoke test\n\nRationale line for the smoke test extractor.\n' \
              > "$INSTALL_DIR/hive/curator/DECISIONS.md"

          # Run tail and snapshot output.
          sh "$INSTALL_DIR/memory-hive" tail -n 5 > /tmp/mh-tail.out
          cat /tmp/mh-tail.out

          # Newer write (DECISIONS) must appear before older (log.md) in output.
          dec_line=$(grep -n "DECISIONS.md" /tmp/mh-tail.out | head -1 | cut -d: -f1)
          log_line=$(grep -n "log.md" /tmp/mh-tail.out | head -1 | cut -d: -f1)
          [ -n "$dec_line" ] || { echo "DECISIONS.md not in tail output"; exit 1; }
          [ -n "$log_line" ] || { echo "log.md not in tail output"; exit 1; }
          [ "$dec_line" -lt "$log_line" ] || \
            { echo "Order wrong: DECISIONS at $dec_line, log at $log_line"; exit 1; }

          # Content extraction: dated heading + paragraph must show up.
          grep -q "Newer entry seeded by tail smoke test" /tmp/mh-tail.out || \
            { echo "DECISIONS heading text missing"; exit 1; }
          grep -q "Rationale line for the smoke test extractor" /tmp/mh-tail.out || \
            { echo "DECISIONS body text missing"; exit 1; }
          grep -q "Older entry seeded by tail smoke test" /tmp/mh-tail.out || \
            { echo "log.md body missing"; exit 1; }

          # --silo filter: only coder writes.
          sh "$INSTALL_DIR/memory-hive" tail --silo coder > /tmp/mh-tail-silo.out
          grep -q "agents/coder/log.md" /tmp/mh-tail-silo.out || \
            { echo "--silo coder did not include coder log"; exit 1; }
          ! grep -q "curator/DECISIONS.md" /tmp/mh-tail-silo.out || \
            { echo "--silo coder leaked curator file"; exit 1; }

          # --since filter (today): both writes today, both should show.
          today=$(date +%Y-%m-%d)
          sh "$INSTALL_DIR/memory-hive" tail --since "$today" > /tmp/mh-tail-since.out
          grep -q "DECISIONS.md" /tmp/mh-tail-since.out
          grep -q "log.md"       /tmp/mh-tail-since.out

          # Bad flags must error non-zero.
          set +e
          sh "$INSTALL_DIR/memory-hive" tail -n abc > /dev/null 2>&1
          rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "Bad -n value should error"; exit 1; }

          set +e
          sh "$INSTALL_DIR/memory-hive" tail --since 2026/04/24 > /dev/null 2>&1
          rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "Bad --since format should error"; exit 1; }

          # help text mentions tail.
          sh "$INSTALL_DIR/memory-hive" help | grep -q "memory-hive tail" || \
            { echo "help missing tail entry"; exit 1; }

          echo "Tail CLI smoke OK"
          # Seed three raw learnings under three different agents, all
          # `confidence: low`, all with the same first-H1 (modulo
          # capitalization/punctuation — the normalizer should fold them).
          RAW="$INSTALL_DIR/hive/learnings/raw"
          mkdir -p "$RAW/coder" "$RAW/reviewer" "$RAW/researcher"

          cat > "$RAW/coder/2026-04-23-test-isolation.md" <<'EOF'
          ---
          date: 2026-04-23
          agent: coder
          context: parallel test workers leak DB state
          confidence: low
          ---

          # Test isolation parallel

          Function-scoped fixtures fix it.
          EOF

          cat > "$RAW/reviewer/2026-04-24-flaky-tests.md" <<'EOF'
          ---
          date: 2026-04-24
          agent: reviewer
          context: flaky tests under -n auto
          confidence: low
          ---

          # Test Isolation, Parallel!

          Saw the same flake elsewhere.
          EOF

          cat > "$RAW/researcher/2026-04-24-parallel-fix.md" <<'EOF'
          ---
          date: 2026-04-24
          agent: researcher
          context: parallel fix
          confidence: low
          ---

          # test-isolation parallel

          Confirmed across repos.
          EOF

          # Also seed one file with no frontmatter so we can check the
          # lint-warning surface.
          cat > "$RAW/coder/2026-04-25-no-fm.md" <<'EOF'
          # No frontmatter

          This file should be flagged for lint.
          EOF

          OUT="$(sh "$INSTALL_DIR/memory-hive" confidence)"
          printf '%s\n' "$OUT" > /tmp/mh-conf.out
          cat /tmp/mh-conf.out

          # Required assertions:
          #   - cluster header references the (raw) title
          #   - upgrade suggestion line is present
          #   - the rule citation matches HIVE_ARCHITECTURE
          #   - all three seed files appear in the Files list
          #   - the no-frontmatter file is reported as needing lint
          grep -q "Test isolation parallel" /tmp/mh-conf.out
          grep -q "3 low" /tmp/mh-conf.out
          grep -q "UPGRADE TO MEDIUM" /tmp/mh-conf.out
          grep -q "3 aligned low" /tmp/mh-conf.out
          grep -q "coder/2026-04-23-test-isolation.md" /tmp/mh-conf.out
          grep -q "reviewer/2026-04-24-flaky-tests.md" /tmp/mh-conf.out
          grep -q "researcher/2026-04-24-parallel-fix.md" /tmp/mh-conf.out
          grep -q "2026-04-25-no-fm.md" /tmp/mh-conf.out
          grep -q "Summary: 1 cluster" /tmp/mh-conf.out

          # Help also references the verb.
          sh "$INSTALL_DIR/memory-hive" help | grep -q "memory-hive confidence"
          echo "Confidence smoke OK"

      - name: Tagging smoke — tag + tags verbs
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null

          # Seed a raw learning file with frontmatter.
          mkdir -p "$INSTALL_DIR/hive/learnings/raw"
          SEED="$INSTALL_DIR/hive/learnings/raw/coder-tagging-smoke.md"
          cat > "$SEED" <<'EOF'
          ---
          date: 2026-04-24
          agent: coder
          context: ci tagging smoke
          ---

          # Body
          EOF

          # tag with a single tag, expect frontmatter to gain it.
          sh "$INSTALL_DIR/memory-hive" tag "$SEED" testing
          grep -q '^tags: testing$' "$SEED" || { echo "tag was not written"; exit 1; }

          # Idempotent re-tag: adding the same tag again must NOT duplicate.
          sh "$INSTALL_DIR/memory-hive" tag "$SEED" testing
          test "$(grep -c '^tags:' "$SEED")" -eq 1 || { echo "duplicate tags: line"; exit 1; }
          grep -q '^tags: testing$' "$SEED" || { echo "tag dedup broke the line"; exit 1; }

          # Add more tags; result must be sorted alphabetically.
          sh "$INSTALL_DIR/memory-hive" tag "$SEED" parallel fixtures
          grep -q '^tags: fixtures, parallel, testing$' "$SEED" \
              || { echo "tags not merged/sorted as expected:"; grep '^tags:' "$SEED"; exit 1; }

          # Invalid tag (uppercase) must fail with non-zero exit.
          set +e
          sh "$INSTALL_DIR/memory-hive" tag "$SEED" Bad > /tmp/mh-tag-err.log 2>&1
          rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "uppercase tag accepted (should reject)"; exit 1; }

          # File without frontmatter must fail with helpful message.
          NOFM="$INSTALL_DIR/hive/learnings/raw/no-fm.md"
          echo "no frontmatter" > "$NOFM"
          set +e
          sh "$INSTALL_DIR/memory-hive" tag "$NOFM" testing > /tmp/mh-nofm.log 2>&1
          rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "tag accepted file without frontmatter"; exit 1; }
          grep -q "no YAML frontmatter" /tmp/mh-nofm.log \
              || { echo "expected 'no YAML frontmatter' in error"; cat /tmp/mh-nofm.log; exit 1; }

          # tags listing should show every tag with count >= 1.
          sh "$INSTALL_DIR/memory-hive" tags > /tmp/mh-tags.out
          grep -q ' testing$' /tmp/mh-tags.out  || { echo "testing missing from tags output"; cat /tmp/mh-tags.out; exit 1; }
          grep -q ' parallel$' /tmp/mh-tags.out || { echo "parallel missing from tags output"; cat /tmp/mh-tags.out; exit 1; }
          grep -q ' fixtures$' /tmp/mh-tags.out || { echo "fixtures missing from tags output"; cat /tmp/mh-tags.out; exit 1; }
          # Count for "testing" must be exactly 1 (one file uses it).
          count="$(awk '$2 == "testing" { print $1 }' /tmp/mh-tags.out)"
          [ "$count" = "1" ] || { echo "expected count=1 for testing, got $count"; exit 1; }

          # tags --tag <name> lists files using that tag.
          sh "$INSTALL_DIR/memory-hive" tags --tag testing > /tmp/mh-tag-files.out
          grep -q "learnings/raw/coder-tagging-smoke.md" /tmp/mh-tag-files.out \
              || { echo "expected file in --tag listing"; cat /tmp/mh-tag-files.out; exit 1; }

          # tags --agent coder restricts the scan; --agent ghost finds nothing.
          sh "$INSTALL_DIR/memory-hive" tags --agent coder | grep -q ' testing$' \
              || { echo "--agent coder lost the tag"; exit 1; }
          sh "$INSTALL_DIR/memory-hive" tags --agent ghost | grep -q "no tagged" \
              || { echo "--agent ghost should report empty"; exit 1; }

          echo "Tagging smoke OK"

      - name: Stale-raw smoke — doctor surfaces backdated learnings
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null 2>&1

          mkdir -p "$INSTALL_DIR/hive/learnings/raw/coder"
          # 1) fresh: should NOT be stale
          echo "fresh" > "$INSTALL_DIR/hive/learnings/raw/coder/fresh-thing.md"
          # 2) stale + unreviewed: should appear in doctor + stale verb
          echo "stale" > "$INSTALL_DIR/hive/learnings/raw/coder/stale-thing.md"
          # 3) stale but referenced in DECISIONS.md: should be excluded
          echo "promoted" > "$INSTALL_DIR/hive/learnings/raw/coder/promoted-thing.md"
          # Backdate the two old ones (10 days). GNU/BSD touch differ; try both.
          touch -d '10 days ago' \
              "$INSTALL_DIR/hive/learnings/raw/coder/stale-thing.md" \
              "$INSTALL_DIR/hive/learnings/raw/coder/promoted-thing.md" 2>/dev/null || \
          touch -t "$(date -v-10d +%Y%m%d%H%M.%S)" \
              "$INSTALL_DIR/hive/learnings/raw/coder/stale-thing.md" \
              "$INSTALL_DIR/hive/learnings/raw/coder/promoted-thing.md"
          echo "promoted: see promoted-thing.md" >> "$INSTALL_DIR/hive/curator/DECISIONS.md"

          # `stale --count` should be exactly 1 (stale-thing.md only).
          n=$(sh "$INSTALL_DIR/memory-hive" stale --count)
          [ "$n" = "1" ] || { echo "stale --count expected 1, got $n"; exit 1; }

          # Doctor stale section should appear and reference the file.
          sh "$INSTALL_DIR/memory-hive" doctor > /tmp/mh-stale.log 2>&1 || true
          grep -q "raw learnings >7 days old" /tmp/mh-stale.log || \
              { echo "doctor missing stale section"; cat /tmp/mh-stale.log; exit 1; }
          grep -q "stale-thing.md" /tmp/mh-stale.log || \
              { echo "doctor did not list stale-thing.md"; cat /tmp/mh-stale.log; exit 1; }
          if grep -q "promoted-thing.md" /tmp/mh-stale.log; then
              echo "doctor incorrectly listed promoted-thing.md (DECISIONS.md backlink ignored)"
              exit 1
          fi

          # Threshold escalation: drop threshold to 0 -> doctor must warn.
          set +e
          MEMORY_HIVE_STALE_THRESHOLD=0 sh "$INSTALL_DIR/memory-hive" doctor > /tmp/mh-stale2.log 2>&1
          rc=$?
          set -e
          [ "$rc" -eq 1 ] || { echo "doctor should exit 1 with threshold=0; got $rc"; exit 1; }
          grep -q "!! 1 raw learnings" /tmp/mh-stale2.log || \
              { echo "doctor did not escalate to warning"; cat /tmp/mh-stale2.log; exit 1; }

          # --agent filter: empty for an agent with no stale files.
          mkdir -p "$INSTALL_DIR/hive/learnings/raw/main"
          n_main=$(sh "$INSTALL_DIR/memory-hive" stale --agent main --count)
          [ "$n_main" = "0" ] || { echo "agent=main expected 0, got $n_main"; exit 1; }

          echo "Stale-raw smoke OK"

      - name: Checkpoint + diff smoke
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null 2>&1

          # 1. Create a named checkpoint and verify the marker exists.
          sh "$INSTALL_DIR/memory-hive" checkpoint --name ci-test | tee /tmp/mh-cp.out
          test -f "$INSTALL_DIR/hive/.checkpoints/ci-test.marker"
          grep -q "Checkpoint saved: ci-test" /tmp/mh-cp.out

          # 2. --list should print the new checkpoint.
          sh "$INSTALL_DIR/memory-hive" checkpoint --list | tee /tmp/mh-cp-list.out
          grep -q "ci-test" /tmp/mh-cp-list.out

          # 3. diff with no changes since checkpoint should report none.
          sh "$INSTALL_DIR/memory-hive" diff --since ci-test | tee /tmp/mh-diff-empty.out
          grep -q "No writes since reference" /tmp/mh-diff-empty.out

          # 4. Append a line to a silo log (the canonical "agent did work"
          # event), then diff again. The file MUST appear under Modified
          # (it existed before the checkpoint, just got appended to).
          # Wait at least 1s so the mtime is unambiguously newer than the
          # marker on filesystems with 1s mtime granularity.
          sleep 2
          echo "ci entry" >> "$INSTALL_DIR/hive/agents/main/log.md"
          sh "$INSTALL_DIR/memory-hive" diff --since ci-test | tee /tmp/mh-diff.out

          # The entry must appear in the Modified section, NOT the New
          # section. We extract the chunk between "Modified" and the next
          # blank line and assert log.md is in it.
          awk '/^Modified/ {flag=1; next} /^$/ {flag=0} flag' /tmp/mh-diff.out > /tmp/mh-diff-mod.out
          grep -q "agents/main/log.md" /tmp/mh-diff-mod.out \
            || { echo "log.md not under Modified"; cat /tmp/mh-diff.out; exit 1; }

          # 5. Add a brand new file under learnings/raw/. It MUST appear
          # under New files (didn't exist at checkpoint time).
          sleep 1
          mkdir -p "$INSTALL_DIR/hive/learnings/raw/main"
          echo "raw" > "$INSTALL_DIR/hive/learnings/raw/main/ci-note.md"
          sh "$INSTALL_DIR/memory-hive" diff --since ci-test | tee /tmp/mh-diff2.out
          awk '/^New files/ {flag=1; next} /^$/ {flag=0} flag' /tmp/mh-diff2.out > /tmp/mh-diff-new.out
          grep -q "learnings/raw/main/ci-note.md" /tmp/mh-diff-new.out \
            || { echo "ci-note.md not under New files"; cat /tmp/mh-diff2.out; exit 1; }

          # 6. Unknown --since should error nonzero.
          set +e
          sh "$INSTALL_DIR/memory-hive" diff --since does-not-exist > /tmp/mh-diff-bad.out 2>&1
          rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "Expected error for unknown checkpoint"; exit 1; }
          grep -q "No checkpoint or date matches" /tmp/mh-diff-bad.out

          # 7. Default --since (no flag) should fall back to newest checkpoint.
          sh "$INSTALL_DIR/memory-hive" diff > /tmp/mh-diff-default.out
          grep -q "ci-test" /tmp/mh-diff-default.out

          echo "Checkpoint + diff smoke OK"

      - name: CLI smoke — dedup near-duplicate raw learnings
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null

          # Seed two near-duplicate raw learnings under different agents.
          # Same topic ("test isolation across parallel workers"), different
          # filenames and prose. dedup --across-agents (default) must cluster
          # them; --per-agent must NOT.
          mkdir -p "$INSTALL_DIR/hive/learnings/raw/coder"
          mkdir -p "$INSTALL_DIR/hive/learnings/raw/reviewer"
          mkdir -p "$INSTALL_DIR/hive/learnings/raw/researcher"

          cat > "$INSTALL_DIR/hive/learnings/raw/coder/2026-04-23-test-isolation.md" <<'L1'
          ---
          date: 2026-04-23
          agent: coder
          ---

          # Test isolation in parallel workers

          Pytest -n auto produced flaky test_user_creation due to a session-scoped
          DB fixture being reused across tests in the same worker.
          L1

          cat > "$INSTALL_DIR/hive/learnings/raw/reviewer/2026-04-24-flaky-tests.md" <<'L2'
          ---
          date: 2026-04-24
          agent: reviewer
          ---

          # Test isolation parallel workers

          Reviewer noticed flaky tests in parallel mode caused by shared mutable
          DB fixture. Function-scoped fixtures fix the flake.
          L2

          # Unrelated learning — must not cluster.
          cat > "$INSTALL_DIR/hive/learnings/raw/researcher/2026-04-24-embedding-latency.md" <<'L3'
          ---
          date: 2026-04-24
          agent: researcher
          ---

          # Embedding model latency notes

          Sentence-transformers all-MiniLM-L6-v2 averages 8ms per sentence on M1.
          L3

          # 1) Default (across-agents): one cluster of two files.
          sh "$INSTALL_DIR/memory-hive" dedup | tee /tmp/mh-dedup.out
          grep -q "1 cluster(s) found, 2 files involved" /tmp/mh-dedup.out
          grep -q "coder/2026-04-23-test-isolation.md" /tmp/mh-dedup.out
          grep -q "reviewer/2026-04-24-flaky-tests.md" /tmp/mh-dedup.out
          # The unrelated entry must NOT appear in any cluster body.
          ! grep -q "embedding-latency" /tmp/mh-dedup.out

          # 2) --per-agent must find no clusters (the two duplicates live in
          #    different agent dirs).
          sh "$INSTALL_DIR/memory-hive" dedup --per-agent | tee /tmp/mh-dedup-per.out
          grep -q "No near-duplicates found" /tmp/mh-dedup-per.out

          # 3) --help is a documented shape, must succeed and mention threshold.
          sh "$INSTALL_DIR/memory-hive" dedup --help | grep -q -- "--threshold"

          # 4) Raw files were never modified (sanity: count + content unchanged).
          test "$(find "$INSTALL_DIR/hive/learnings/raw" -name '*.md' | wc -l | tr -d ' ')" = "3"
          grep -q "test_user_creation" "$INSTALL_DIR/hive/learnings/raw/coder/2026-04-23-test-isolation.md"

          echo "Dedup smoke OK"

      - name: CLI smoke — conflicts surfaces contradictions
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null 2>&1

          # Seed two raw learnings under different agents with the same
          # normalized title but contradictory bodies + frontmatter. The
          # heredoc body MUST align with the `cat <<'EOF'` verb so YAML
          # common-indent strip leaves flat content (per coder memory).
          mkdir -p "$INSTALL_DIR/hive/learnings/raw/coder"
          mkdir -p "$INSTALL_DIR/hive/learnings/raw/reviewer"

          cat > "$INSTALL_DIR/hive/learnings/raw/coder/2026-04-23-shell-heredocs.md" <<'L1'
          ---
          date: 2026-04-23
          agent: coder
          context: ci tests
          confidence: high
          kind: win
          ---

          # Use shell heredocs for tests

          Heredocs always work great for seeding fixtures. Use heredocs in CI;
          they enable clean multi-line content.
          L1

          cat > "$INSTALL_DIR/hive/learnings/raw/reviewer/2026-04-24-shell-heredocs.md" <<'L2'
          ---
          date: 2026-04-24
          agent: reviewer
          context: ci tests
          confidence: low
          kind: mistake
          ---

          # Use shell heredocs for tests

          Heredocs never work. Avoid heredocs in CI; they fail because of
          YAML indent contamination.
          L2

          # 1. Default run: cluster appears with at least one signal.
          sh "$INSTALL_DIR/memory-hive" conflicts | tee /tmp/mh-conflicts.out
          grep -q "Cluster:" /tmp/mh-conflicts.out
          grep -q "coder/2026-04-23-shell-heredocs.md" /tmp/mh-conflicts.out
          grep -q "reviewer/2026-04-24-shell-heredocs.md" /tmp/mh-conflicts.out
          # All three signals should fire on this fixture.
          grep -q "opposing-claim words" /tmp/mh-conflicts.out
          grep -q "confidence mismatch" /tmp/mh-conflicts.out
          grep -q "opposite frontmatter verdicts" /tmp/mh-conflicts.out
          grep -q "1 conflict cluster(s) found" /tmp/mh-conflicts.out

          # 2. --write appends a stub block to curator/CONFLICTS.md.
          BEFORE=$(wc -l < "$INSTALL_DIR/hive/curator/CONFLICTS.md")
          sh "$INSTALL_DIR/memory-hive" conflicts --write > /tmp/mh-conflicts-w.out 2>&1
          AFTER=$(wc -l < "$INSTALL_DIR/hive/curator/CONFLICTS.md")
          if [ "$AFTER" -le "$BEFORE" ]; then
              echo "FAIL: CONFLICTS.md did not grow ($BEFORE -> $AFTER)"
              exit 1
          fi
          grep -q "heredocs shell tests use" "$INSTALL_DIR/hive/curator/CONFLICTS.md"
          grep -q "Auto-detected by" "$INSTALL_DIR/hive/curator/CONFLICTS.md"
          grep -q "Status:.*unresolved" "$INSTALL_DIR/hive/curator/CONFLICTS.md"

          # 3. --strict exits non-zero when conflicts exist.
          set +e
          sh "$INSTALL_DIR/memory-hive" conflicts --strict > /dev/null 2>&1
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
              echo "FAIL: --strict should exit non-zero with conflicts"
              exit 1
          fi

          # 4. --agent filter narrows scope. coder is in the cluster, so it
          #    should still find the conflict. "nobody" is not, so no match.
          sh "$INSTALL_DIR/memory-hive" conflicts --agent coder > /tmp/mh-conflicts-a1.out 2>&1
          grep -q "Cluster:" /tmp/mh-conflicts-a1.out
          sh "$INSTALL_DIR/memory-hive" conflicts --agent nobody > /tmp/mh-conflicts-a2.out 2>&1
          grep -q "No conflicts found" /tmp/mh-conflicts-a2.out

          # 5. Top-level help mentions the new verb.
          sh "$INSTALL_DIR/memory-hive" help | grep -q "memory-hive conflicts"

          # 6. Raw files untouched.
          test "$(find "$INSTALL_DIR/hive/learnings/raw" -name '*.md' | wc -l | tr -d ' ')" = "2"
          grep -q "Heredocs always work" "$INSTALL_DIR/hive/learnings/raw/coder/2026-04-23-shell-heredocs.md"
          grep -q "Heredocs never work"  "$INSTALL_DIR/hive/learnings/raw/reviewer/2026-04-24-shell-heredocs.md"

          echo "Conflicts smoke OK"

      - name: Query smoke — searchable hive
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null

          # Seed a deterministic canary string in three different surfaces
          # (silo log, silo memory, and a raw learning) so each filter flag
          # has something to assert on.
          sh "$INSTALL_DIR/memory-hive" add qtester --role coder > /dev/null
          echo "- alphazebra: query canary line in log" \
              >> "$INSTALL_DIR/hive/agents/qtester/log.md"
          echo "- alphazebra also in memory" \
              >> "$INSTALL_DIR/hive/agents/qtester/memory.md"
          mkdir -p "$INSTALL_DIR/hive/learnings/raw"
          cat > "$INSTALL_DIR/hive/learnings/raw/qtester-seed.md" <<'SEED'
          ---
          date: 2026-04-24
          agent: qtester
          context: query smoke
          ---
          alphazebra is the canary
          SEED

          # 1. Default search finds the canary across all three surfaces.
          sh "$INSTALL_DIR/memory-hive" query alphazebra > /tmp/q1.out 2>&1
          grep -q "agents/qtester/log.md"        /tmp/q1.out
          grep -q "agents/qtester/memory.md"     /tmp/q1.out
          grep -q "learnings/raw/qtester-seed.md" /tmp/q1.out
          grep -q "3 match(es) across 3 file"    /tmp/q1.out

          # 2. --paths-only is one relative path per line.
          sh "$INSTALL_DIR/memory-hive" query alphazebra --paths-only \
              > /tmp/q2.out 2>&1
          grep -q "^agents/qtester/log.md$"        /tmp/q2.out
          grep -q "^agents/qtester/memory.md$"     /tmp/q2.out
          grep -q "^learnings/raw/qtester-seed.md$" /tmp/q2.out

          # 3. --kind log narrows to the log file only.
          sh "$INSTALL_DIR/memory-hive" query alphazebra --kind log \
              --paths-only > /tmp/q3.out 2>&1
          grep -q "^agents/qtester/log.md$"        /tmp/q3.out
          ! grep -q "memory.md"                    /tmp/q3.out

          # 4. --silo qtester narrows to that silo (excludes raw/).
          sh "$INSTALL_DIR/memory-hive" query alphazebra --silo qtester \
              --paths-only > /tmp/q4.out 2>&1
          grep -q "^agents/qtester/log.md$"        /tmp/q4.out
          ! grep -q "learnings/raw"                /tmp/q4.out

          # 5. No match exits 1 (so it pipes into shell conditionals).
          set +e
          sh "$INSTALL_DIR/memory-hive" query "zzznotinhive_xyzqq" \
              > /tmp/q5.out 2>&1
          rc=$?
          set -e
          [ "$rc" -eq 1 ] || { echo "expected exit 1 on no-match, got $rc"; exit 1; }

          # 6. --regex accepts an ERE pattern.
          sh "$INSTALL_DIR/memory-hive" query --regex 'alpha[a-z]+' \
              --paths-only > /tmp/q6.out 2>&1
          grep -q "qtester/log.md"                 /tmp/q6.out

          # 7. Bad --kind dies cleanly (exit 1, error to stderr).
          set +e
          sh "$INSTALL_DIR/memory-hive" query foo --kind nope \
              > /tmp/q7.out 2>&1
          rc=$?
          set -e
          [ "$rc" -eq 1 ] || { echo "expected exit 1 on bad --kind, got $rc"; exit 1; }
          grep -q "Unknown --kind"                 /tmp/q7.out

          # 8. Top-level help mentions the new verb.
          sh "$INSTALL_DIR/memory-hive" help | grep -q "memory-hive query"
          echo "Query smoke OK"


      - name: Lint smoke — frontmatter schema validation
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null 2>&1

          RAW="$INSTALL_DIR/hive/learnings/raw"
          mkdir -p "$RAW/coder" "$RAW/researcher"

          # 1. Empty raw dir — lint must succeed (exit 0).
          sh "$INSTALL_DIR/memory-hive" lint
          echo "Empty lint OK"

          # 2. Single good file — exit 0.
          cat > "$RAW/coder/2026-04-23-good-entry.md" <<'GOOD'
          ---
          date: 2026-04-23
          agent: coder
          context: validating the lint feature itself
          confidence: medium
          ---

          # A good entry

          Body content.
          GOOD
          sh "$INSTALL_DIR/memory-hive" lint
          echo "Good-file lint OK"

          # 3. Bad file — must exit 2, must mention the right errors.
          cat > "$RAW/coder/BadName_2026-04-23.md" <<'BAD'
          ---
          date: 2026-13-99
          agent: researcher
          context: malformed
          ---

          Body without H1.
          BAD
          cat > "$RAW/researcher/no-frontmatter.md" <<'NOFM'
          # Title but no frontmatter
          NOFM

          set +e
          sh "$INSTALL_DIR/memory-hive" lint > /tmp/mh-lint.log 2>&1
          rc=$?
          set -e
          [ "$rc" -eq 2 ] || { echo "Bad-file lint should exit 2, got $rc"; cat /tmp/mh-lint.log; exit 1; }
          grep -q "missing required field .confidence." /tmp/mh-lint.log || \
              { echo "Did not flag missing confidence"; cat /tmp/mh-lint.log; exit 1; }
          grep -q "agent: researcher.* does not match parent directory .coder." /tmp/mh-lint.log || \
              { echo "Did not flag agent mismatch"; cat /tmp/mh-lint.log; exit 1; }
          grep -q "file does not start with" /tmp/mh-lint.log || \
              { echo "Did not flag missing frontmatter"; cat /tmp/mh-lint.log; exit 1; }
          grep -q "errors,.*warnings across" /tmp/mh-lint.log || \
              { echo "Tally line missing"; cat /tmp/mh-lint.log; exit 1; }
          echo "Bad-file lint OK"

          # 4. --strict on warnings-only must exit 2.
          rm -f "$RAW/coder/BadName_2026-04-23.md" "$RAW/researcher/no-frontmatter.md"
          # File with only a filename warning (otherwise valid frontmatter).
          # Uppercase + underscores in the slug, but the date prefix is
          # already correct so --fix can produce a conformant filename.
          cat > "$RAW/coder/2026-04-23_Wrong_Name.md" <<'WARN'
          ---
          date: 2026-04-23
          agent: coder
          context: warning-only file
          confidence: low
          ---
          # Title
          WARN
          set +e
          sh "$INSTALL_DIR/memory-hive" lint > /tmp/mh-lint-w.log 2>&1
          rc1=$?
          sh "$INSTALL_DIR/memory-hive" lint --strict > /tmp/mh-lint-s.log 2>&1
          rc2=$?
          set -e
          [ "$rc1" -eq 1 ] || { echo "Warnings-only lint should exit 1, got $rc1"; cat /tmp/mh-lint-w.log; exit 1; }
          [ "$rc2" -eq 2 ] || { echo "--strict on warnings should exit 2, got $rc2"; cat /tmp/mh-lint-s.log; exit 1; }
          echo "Strict-mode lint OK"

          # 5. --fix should rename uppercase/underscore filenames in place.
          sh "$INSTALL_DIR/memory-hive" lint --fix > /tmp/mh-lint-f.log 2>&1
          test -f "$RAW/coder/2026-04-23-wrong-name.md" || \
              { echo "--fix did not rename"; ls "$RAW/coder/"; cat /tmp/mh-lint-f.log; exit 1; }
          test ! -f "$RAW/coder/2026-04-23_Wrong_Name.md" || \
              { echo "--fix left the original file behind"; exit 1; }
          grep -q "fixed.*renamed" /tmp/mh-lint-f.log || \
              { echo "--fix did not log the rename"; cat /tmp/mh-lint-f.log; exit 1; }
          # And after --fix the lint should be clean.
          sh "$INSTALL_DIR/memory-hive" lint
          echo "Fix-mode lint OK"

          echo "Lint smoke OK"
      - name: CLI smoke — digest extracts content
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null

          # Empty hive in the default 24h window: digest must say
          # "Nothing changed" (and exit 0).
          sh "$INSTALL_DIR/memory-hive" digest > /tmp/mh-dig-empty.out 2>&1
          grep -q "Nothing changed in this window" /tmp/mh-dig-empty.out

          # Help mentions the digest verb.
          sh "$INSTALL_DIR/memory-hive" help > /tmp/mh-help.out
          grep -q "memory-hive digest" /tmp/mh-help.out

          # Sleep so the log mtime is strictly newer than the install
          # baseline. Filesystems with second-granularity mtimes need this.
          sleep 2

          # Append a real dated entry to the main silo log. Avoid heredoc
          # so the YAML "run: |" indent doesn't poison the body, and use
          # `printf -- '%s\n'` so leading-dash bullets aren't parsed as
          # printf flags.
          {
              printf -- '%s\n' '# main -- log'
              printf -- '%s\n' ''
              printf -- '%s\n' '## 2026-04-24'
              printf -- '%s\n' ''
              printf -- '%s\n' '- Smoke-test entry: digest should pick this line up.'
          } > "$INSTALL_DIR/hive/agents/main/log.md"

          # Default window (last 24h) must surface the entry.
          sh "$INSTALL_DIR/memory-hive" digest > /tmp/mh-dig.out 2>&1
          grep -q "main (1 write)" /tmp/mh-dig.out
          grep -q "Smoke-test entry" /tmp/mh-dig.out
          grep -q "Total: 1 write across 1 agent" /tmp/mh-dig.out

          # --week alias works. (Redirect first; piping straight into
          # `grep -q` triggers SIGPIPE on the CLI's own printfs under
          # bash's set -e -o pipefail and that's not a real failure.)
          sh "$INSTALL_DIR/memory-hive" digest --week > /tmp/mh-dig-week.out
          grep -q "Smoke-test entry" /tmp/mh-dig-week.out

          # --since YYYY-MM-DD parses on both GNU date and BSD date.
          sh "$INSTALL_DIR/memory-hive" digest --since 2026-01-01 > /tmp/mh-dig-since.out
          grep -q "Smoke-test entry" /tmp/mh-dig-since.out

          # Bad date is rejected with a clear error.
          if sh "$INSTALL_DIR/memory-hive" digest --since notadate \
              > /tmp/mh-dig-bad.out 2>&1; then
              echo "Expected non-zero rc for bad --since" >&2
              exit 1
          fi
          grep -q "Could not parse date" /tmp/mh-dig-bad.out

          echo "Digest smoke OK"

      - name: CLI smoke — curate autonomous loop
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null

          # Help text references the verb.
          sh "$INSTALL_DIR/memory-hive" help | grep -q "memory-hive curate" || \
              { echo "help missing curate entry"; exit 1; }

          # Sleep so seeded files have mtimes strictly after the install
          # baseline marker (some CI runners finish install in <1s).
          sleep 2

          # Seed three aligned high-confidence raw learnings under three
          # different agents with the same normalized H1. dedup must
          # cluster them; confidence must mark them PROMOTE TO distilled/;
          # curate (apply mode) must promote one of them.
          RAW="$INSTALL_DIR/hive/learnings/raw"
          mkdir -p "$RAW/coder" "$RAW/reviewer" "$RAW/researcher"

          cat > "$RAW/coder/2026-04-23-test-isolation.md" <<'CR'
          ---
          date: 2026-04-23
          agent: coder
          context: parallel test workers leak DB state
          confidence: high
          ---

          # Test isolation parallel

          Function-scoped fixtures fix it. Confirmed across many repos.
          CR

          cat > "$RAW/reviewer/2026-04-24-flaky-tests.md" <<'RV'
          ---
          date: 2026-04-24
          agent: reviewer
          context: flaky tests under -n auto
          confidence: high
          ---

          # Test Isolation, Parallel!

          Same flake, same fix. Multiple confirmations.
          RV

          cat > "$RAW/researcher/2026-04-24-parallel-fix.md" <<'RS'
          ---
          date: 2026-04-24
          agent: researcher
          context: parallel fix
          confidence: high
          ---

          # test-isolation parallel

          Confirmed across repos. High confidence.
          RS

          # --- dry-run mode --------------------------------------------------
          sh "$INSTALL_DIR/memory-hive" curate > /tmp/mh-curate.out 2>&1
          cat /tmp/mh-curate.out

          # Header lines for every step must appear.
          grep -q "memory-hive curate (dry-run)" /tmp/mh-curate.out || \
              { echo "missing dry-run header"; exit 1; }
          grep -q "1. dedup" /tmp/mh-curate.out  || { echo "missing dedup step"; exit 1; }
          grep -q "2. confidence" /tmp/mh-curate.out || { echo "missing confidence step"; exit 1; }
          grep -q "3. promotions" /tmp/mh-curate.out || { echo "missing promotions step"; exit 1; }
          grep -q "4. lint --strict" /tmp/mh-curate.out || { echo "missing lint step"; exit 1; }
          grep -q "5. stale" /tmp/mh-curate.out  || { echo "missing stale step"; exit 1; }
          grep -q "summary" /tmp/mh-curate.out   || { echo "missing summary"; exit 1; }

          # Step 2 must classify the cluster as promotion-ready.
          grep -q "PROMOTE TO distilled" /tmp/mh-curate.out || \
              { echo "promotion-ready cluster not detected by confidence"; exit 1; }

          # Step 3 must offer at least one suggested promotion.
          grep -q "suggest: memory-hive promote" /tmp/mh-curate.out || \
              { echo "step 3 did not suggest a promotion"; exit 1; }

          # Summary line must include all four metrics.
          grep -qE "[0-9]+ clusters need attention, [0-9]+ promotions ready, [0-9]+ lint violations, [0-9]+ stale items" \
              /tmp/mh-curate.out || \
              { echo "summary line malformed"; cat /tmp/mh-curate.out; exit 1; }

          # promotions ready must be >= 1 in dry-run.
          ready_n="$(awk '/promotions ready/ { for (i=1;i<=NF;i++) if ($i=="promotions") { print $(i-1); exit } }' /tmp/mh-curate.out)"
          [ "$ready_n" -ge 1 ] || { echo "expected ready >=1, got $ready_n"; exit 1; }

          # Dry-run must NOT have written distilled or DECISIONS entries.
          # The installer scaffolds distilled/patterns.md and DECISIONS.md
          # already, so we snapshot byte-size and content rather than
          # checking for file absence.
          DISTILLED_DIR="$INSTALL_DIR/hive/learnings/distilled"
          DECISIONS="$INSTALL_DIR/hive/curator/DECISIONS.md"
          PATTERNS_BYTES_BEFORE="$(wc -c < "$DISTILLED_DIR/patterns.md" 2>/dev/null || echo 0)"
          if grep -q "Promoted .learnings/raw" "$DECISIONS" 2>/dev/null; then
              echo "FAIL: dry-run appended a Promoted entry to DECISIONS.md"
              exit 1
          fi
          # Stash for post-apply byte-comparison.
          echo "$PATTERNS_BYTES_BEFORE" > /tmp/mh-curate-bytes-before
          echo "Curate dry-run OK"

          # --- apply mode ----------------------------------------------------
          sh "$INSTALL_DIR/memory-hive" curate --apply > /tmp/mh-curate-apply.out 2>&1
          cat /tmp/mh-curate-apply.out

          grep -q "memory-hive curate (apply)" /tmp/mh-curate-apply.out || \
              { echo "missing apply header"; exit 1; }
          grep -q "applying: memory-hive promote" /tmp/mh-curate-apply.out || \
              { echo "apply mode did not run promote"; exit 1; }
          grep -q "promoted." /tmp/mh-curate-apply.out || \
              { echo "apply mode did not log success"; exit 1; }

          # Distilled file must now exist AND have grown in bytes.
          test -f "$DISTILLED_DIR/patterns.md" || \
              { echo "FAIL: apply did not write distilled/patterns.md"; \
                ls -la "$DISTILLED_DIR" 2>/dev/null || true; exit 1; }
          PATTERNS_BYTES_AFTER="$(wc -c < "$DISTILLED_DIR/patterns.md")"
          PATTERNS_BYTES_BEFORE="$(cat /tmp/mh-curate-bytes-before)"
          [ "$PATTERNS_BYTES_AFTER" -gt "$PATTERNS_BYTES_BEFORE" ] || \
              { echo "FAIL: distilled/patterns.md unchanged after apply (was $PATTERNS_BYTES_BEFORE, now $PATTERNS_BYTES_AFTER)"; exit 1; }
          # And it must reference the title.
          grep -qi "Test isolation" "$DISTILLED_DIR/patterns.md" || \
              { echo "FAIL: distilled/patterns.md missing expected title"; \
                cat "$DISTILLED_DIR/patterns.md"; exit 1; }

          # DECISIONS.md must have a Promoted entry from this run.
          test -f "$DECISIONS" || \
              { echo "FAIL: DECISIONS.md not created by apply"; exit 1; }
          grep -q "Promoted .learnings/raw" "$DECISIONS" || \
              { echo "FAIL: DECISIONS.md missing Promoted entry"; \
                cat "$DECISIONS"; exit 1; }

          # Summary in apply mode must include "applied" count.
          grep -qE "promotions ready \([0-9]+ applied\)" /tmp/mh-curate-apply.out || \
              { echo "apply summary missing applied count"; exit 1; }

          # Bad flag rejected.
          set +e
          sh "$INSTALL_DIR/memory-hive" curate --bogus > /tmp/mh-curate-bad.out 2>&1
          rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "expected nonzero on --bogus, got 0"; exit 1; }

          echo "Curate apply OK"

      - name: CLI smoke — bundle assembles prompt-ready context
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null

          # Sleep so seeded files have mtimes strictly newer than the
          # install baseline (otherwise the bundle's baseline filter
          # treats them as install scaffolding and skips them).
          sleep 2

          # Seed a knowledge file (HUMAN_CONTEXT) and a distilled file.
          # Use printf to avoid YAML literal-block indent contamination.
          printf '%s\n' '# Human Context' \
                       '' \
                       '- BUNDLE-CANARY-HUMAN: this is the curated human context.' \
              > "$INSTALL_DIR/hive/knowledge/HUMAN_CONTEXT.md"

          mkdir -p "$INSTALL_DIR/hive/learnings/distilled"
          printf '%s\n' '# Patterns' \
                       '' \
                       '## BUNDLE-CANARY-DISTILLED' \
                       '' \
                       'A distilled pattern that bundle should surface.' \
              > "$INSTALL_DIR/hive/learnings/distilled/patterns.md"

          # Stamp main's context.md with a canary so --for main can find it.
          printf '%s\n' '# main context' \
                       '' \
                       'BUNDLE-CANARY-MAIN-CTX' \
              > "$INSTALL_DIR/hive/agents/main/context.md"

          # 1) Default bundle: both seeds appear, main canary does NOT.
          sh "$INSTALL_DIR/memory-hive" bundle > /tmp/mh-bundle.out 2> /tmp/mh-bundle.err
          grep -q "BUNDLE-CANARY-HUMAN" /tmp/mh-bundle.out || \
              { echo "FAIL: HUMAN_CONTEXT not in default bundle"; cat /tmp/mh-bundle.out; exit 1; }
          grep -q "BUNDLE-CANARY-DISTILLED" /tmp/mh-bundle.out || \
              { echo "FAIL: distilled patterns not in default bundle"; cat /tmp/mh-bundle.out; exit 1; }
          if grep -q "BUNDLE-CANARY-MAIN-CTX" /tmp/mh-bundle.out; then
              echo "FAIL: default bundle leaked main silo (no --for given)"
              exit 1
          fi
          # Footer summary lives on stderr.
          grep -q "Bundle:.*chars,.*files,.*tokens" /tmp/mh-bundle.err || \
              { echo "FAIL: footer summary missing on stderr"; cat /tmp/mh-bundle.err; exit 1; }
          # Sections must be H1-headed with their source path.
          grep -q "^# hive/index.md" /tmp/mh-bundle.out || \
              { echo "FAIL: no H1 heading for index.md"; exit 1; }
          grep -q "^# hive/knowledge/HUMAN_CONTEXT.md" /tmp/mh-bundle.out || \
              { echo "FAIL: no H1 heading for HUMAN_CONTEXT.md"; exit 1; }

          # 2) --for main appends main silo (context.md must show up).
          sh "$INSTALL_DIR/memory-hive" bundle --for main > /tmp/mh-bundle-main.out 2> /tmp/mh-bundle-main.err
          grep -q "BUNDLE-CANARY-MAIN-CTX" /tmp/mh-bundle-main.out || \
              { echo "FAIL: --for main did not include main's context.md"; cat /tmp/mh-bundle-main.out; exit 1; }
          grep -q "^# hive/agents/main/context.md" /tmp/mh-bundle-main.out || \
              { echo "FAIL: --for main: no H1 for agents/main/context.md"; exit 1; }

          # 3) --out writes to a file (and stdout stays empty).
          sh "$INSTALL_DIR/memory-hive" bundle --out /tmp/mh-bundle-file.md \
              > /tmp/mh-bundle-stdout.out 2> /tmp/mh-bundle-file.err
          test -s /tmp/mh-bundle-file.md || \
              { echo "FAIL: --out did not write to file"; exit 1; }
          grep -q "BUNDLE-CANARY-HUMAN" /tmp/mh-bundle-file.md || \
              { echo "FAIL: --out file missing canary"; exit 1; }
          if [ -s /tmp/mh-bundle-stdout.out ]; then
              echo "FAIL: --out should leave stdout empty, got:"
              cat /tmp/mh-bundle-stdout.out
              exit 1
          fi
          grep -q "Bundle:.*chars" /tmp/mh-bundle-file.err || \
              { echo "FAIL: --out should still print footer to stderr"; cat /tmp/mh-bundle-file.err; exit 1; }

          # 4) --max-tokens trims the bundle below the budget. Full
          # bundle is several thousand chars; 50 tokens = 200 chars
          # absolute cap, so the trimmed output must be <= 200 chars.
          sh "$INSTALL_DIR/memory-hive" bundle --max-tokens 50 > /tmp/mh-bundle-trim.out 2> /tmp/mh-bundle-trim.err
          full_chars="$(wc -c < /tmp/mh-bundle.out | tr -d ' ')"
          trim_chars="$(wc -c < /tmp/mh-bundle-trim.out | tr -d ' ')"
          [ "$trim_chars" -le 200 ] || \
              { echo "FAIL: trimmed bundle is $trim_chars chars, expected <= 200"; exit 1; }
          [ "$trim_chars" -lt "$full_chars" ] || \
              { echo "FAIL: trim did not reduce size ($trim_chars vs $full_chars)"; exit 1; }

          # 5) Unknown agent dies with a useful error.
          set +e
          sh "$INSTALL_DIR/memory-hive" bundle --for ghost > /tmp/mh-bundle-bad.out 2>&1
          rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "FAIL: --for ghost should error"; exit 1; }
          grep -q "Unknown agent silo: ghost" /tmp/mh-bundle-bad.out || \
              { echo "FAIL: error message did not mention ghost"; cat /tmp/mh-bundle-bad.out; exit 1; }

          # 6) Help mentions the verb.
          sh "$INSTALL_DIR/memory-hive" help | grep -q "memory-hive bundle" || \
              { echo "FAIL: help missing bundle entry"; exit 1; }

          echo "Bundle smoke OK"

      - name: CLI smoke — reflect distills recurring themes
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null

          # Reflect needs a silo with a real log.md. Create one.
          sh "$INSTALL_DIR/memory-hive" add reflectee --role coder > /dev/null

          # Compute a window-relative date set so the CI test does not break
          # when the calendar moves. Five entries, three sharing the canary
          # theme "isolation" (must surface as a recurring pattern), one
          # off-topic (perf), and one unrelated (docs). Use printf rather
          # than a heredoc so YAML's literal-block indent does not poison
          # the file content (would break the `^## ` matches).
          d0=$(date '+%Y-%m-%d')
          # GNU and BSD date both accept these forms; try each.
          d1=$(date -d '1 day ago' '+%Y-%m-%d' 2>/dev/null || date -v-1d '+%Y-%m-%d')
          d2=$(date -d '2 days ago' '+%Y-%m-%d' 2>/dev/null || date -v-2d '+%Y-%m-%d')
          d3=$(date -d '3 days ago' '+%Y-%m-%d' 2>/dev/null || date -v-3d '+%Y-%m-%d')
          d4=$(date -d '4 days ago' '+%Y-%m-%d' 2>/dev/null || date -v-4d '+%Y-%m-%d')

          {
              printf -- '%s\n' '# reflectee -- log'
              printf -- '%s\n' ''
              printf '## %s\n' "$d0"
              printf -- '%s\n' ''
              printf -- '%s\n' '- Hit a flaky pytest run because the database fixture leaked across parallel workers; switched to function-scoped fixtures to fix the test isolation problem.'
              printf -- '%s\n' ''
              printf '## %s\n' "$d1"
              printf -- '%s\n' ''
              printf -- '%s\n' '- Investigated test isolation failures under pytest-xdist. Root cause: shared mutable state in the database fixture across pytest workers.'
              printf -- '%s\n' ''
              printf '## %s\n' "$d2"
              printf -- '%s\n' ''
              printf -- '%s\n' '- Reviewed pytest harness for the embedding service. Identified another test isolation gap where workers shared a temp directory.'
              printf -- '%s\n' ''
              printf '## %s\n' "$d3"
              printf -- '%s\n' ''
              printf -- '%s\n' '- Embedding service latency: averaged 8ms per sentence on M1. Not isolation-related but logged here for the perf board.'
              printf -- '%s\n' ''
              printf '## %s\n' "$d4"
              printf -- '%s\n' ''
              printf -- '%s\n' '- Documentation pass on the architecture diagram. Clarified the curator loop.'
          } > "$INSTALL_DIR/hive/agents/reflectee/log.md"

          # 1) Default reflect (dry-run): the recurring theme must surface.
          sh "$INSTALL_DIR/memory-hive" reflect reflectee > /tmp/mh-ref.out 2>&1
          cat /tmp/mh-ref.out
          grep -q "isolation" /tmp/mh-ref.out || \
              { echo "FAIL: 'isolation' theme missing from reflect output"; exit 1; }
          grep -q "Patterns from" /tmp/mh-ref.out || \
              { echo "FAIL: addendum heading missing"; exit 1; }
          grep -q "Citations (entries scanned):" /tmp/mh-ref.out || \
              { echo "FAIL: citations block missing"; exit 1; }
          grep -q "dry-run" /tmp/mh-ref.out || \
              { echo "FAIL: dry-run note missing"; exit 1; }

          # 2) Default mode must NOT modify memory.md.
          MEM="$INSTALL_DIR/hive/agents/reflectee/memory.md"
          BEFORE_BYTES="$(wc -c < "$MEM" | tr -d ' ')"
          sh "$INSTALL_DIR/memory-hive" reflect reflectee > /dev/null 2>&1
          AFTER_BYTES="$(wc -c < "$MEM" | tr -d ' ')"
          [ "$BEFORE_BYTES" = "$AFTER_BYTES" ] || \
              { echo "FAIL: dry-run wrote to memory.md ($BEFORE_BYTES -> $AFTER_BYTES)"; exit 1; }

          # 3) --write appends; memory.md must grow and contain the heading.
          sh "$INSTALL_DIR/memory-hive" reflect reflectee --write > /tmp/mh-ref-w.out 2>&1
          AFTER_W="$(wc -c < "$MEM" | tr -d ' ')"
          [ "$AFTER_W" -gt "$BEFORE_BYTES" ] || \
              { echo "FAIL: --write did not grow memory.md"; cat /tmp/mh-ref-w.out; exit 1; }
          grep -q "Patterns from" "$MEM" || \
              { echo "FAIL: addendum heading not appended"; exit 1; }
          grep -q "isolation" "$MEM" || \
              { echo "FAIL: theme not appended to memory.md"; exit 1; }

          # 4) --raw drops a raw learning under learnings/raw/<agent>/.
          sh "$INSTALL_DIR/memory-hive" reflect reflectee --raw > /tmp/mh-ref-r.out 2>&1
          # Find the freshly-written reflect file.
          RAW_DIR="$INSTALL_DIR/hive/learnings/raw/reflectee"
          test -d "$RAW_DIR" || { echo "FAIL: raw dir not created"; exit 1; }
          RAW_HITS="$(find "$RAW_DIR" -name '*-reflect*.md' | wc -l | tr -d ' ')"
          [ "$RAW_HITS" -ge 1 ] || \
              { echo "FAIL: no reflect raw learning written under $RAW_DIR"; ls -la "$RAW_DIR"; exit 1; }
          RAW_FILE="$(find "$RAW_DIR" -name '*-reflect*.md' | head -1)"
          grep -q "^date: " "$RAW_FILE" || \
              { echo "FAIL: raw file missing frontmatter date"; cat "$RAW_FILE"; exit 1; }
          grep -q "^agent: reflectee$" "$RAW_FILE" || \
              { echo "FAIL: raw file missing agent line"; exit 1; }
          grep -q "kind: reflection" "$RAW_FILE" || \
              { echo "FAIL: raw file missing kind:reflection"; exit 1; }
          grep -q "isolation" "$RAW_FILE" || \
              { echo "FAIL: theme missing from raw learning"; exit 1; }

          # 5) --days narrows the window; --days 1 should drop most entries
          # (only the d0 entry survives) → "isolation" should NOT cluster
          # because there are not 3+ distinct entries inside the window.
          sh "$INSTALL_DIR/memory-hive" reflect reflectee --days 1 > /tmp/mh-ref-d1.out 2>&1
          grep -q "No recurring themes" /tmp/mh-ref-d1.out || \
              { echo "FAIL: --days 1 should produce no themes"; cat /tmp/mh-ref-d1.out; exit 1; }

          # 6) Bad agent fails non-zero with a clear message.
          set +e
          sh "$INSTALL_DIR/memory-hive" reflect ghostagent > /tmp/mh-ref-bad.out 2>&1
          rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "FAIL: bad agent should error"; exit 1; }
          grep -q "no silo" /tmp/mh-ref-bad.out || \
              { echo "FAIL: error message did not mention silo"; cat /tmp/mh-ref-bad.out; exit 1; }

          # 7) Bad --days fails non-zero.
          set +e
          sh "$INSTALL_DIR/memory-hive" reflect reflectee --days abc > /tmp/mh-ref-d.out 2>&1
          rc=$?
          set -e
          [ "$rc" -ne 0 ] || { echo "FAIL: bad --days should error"; exit 1; }

          # 8) Top-level help mentions the new verb.
          sh "$INSTALL_DIR/memory-hive" help | grep -q "memory-hive reflect" || \
              { echo "FAIL: help missing reflect entry"; exit 1; }

          echo "Reflect smoke OK"

      - name: Doctor smoke — multi-platform health check
        shell: bash
        run: |
          set -eu
          FAKE_HOME="$(mktemp -d)"
          INSTALL_DIR="$(mktemp -d)"
          export HOME="$FAKE_HOME"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_REPO="$(pwd)"

          mkdir -p "$FAKE_HOME/.claude" "$FAKE_HOME/.cursor"
          sh install.sh < /dev/null > /dev/null 2>&1

          # Happy path: doctor clean.
          sh "$INSTALL_DIR/memory-hive" doctor > /tmp/mh-doc.log 2>&1
          grep -q "Claude Code block points at this install" /tmp/mh-doc.log
          grep -q "Cursor block points at this install" /tmp/mh-doc.log

          # Corrupt Cursor's block to point at a wrong install; doctor should warn.
          sed -i.bak "s|$INSTALL_DIR|/wrong/path|g" "$FAKE_HOME/.cursor/rules/memory-hive.mdc"
          set +e
          sh "$INSTALL_DIR/memory-hive" doctor > /tmp/mh-doc2.log 2>&1
          rc=$?
          set -e
          [ "$rc" -eq 1 ] || { echo "Doctor should exit 1 after corruption, got $rc"; exit 1; }
          grep -q "Cursor block does not reference" /tmp/mh-doc2.log || \
              { echo "Doctor did not flag Cursor drift"; exit 1; }
          echo "Doctor multi-platform smoke OK"

      - name: Citations smoke — directed graph
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null 2>&1

          sh "$INSTALL_DIR/memory-hive" add coder --role coder > /dev/null
          sh "$INSTALL_DIR/memory-hive" add reviewer --role reviewer > /dev/null
          sh "$INSTALL_DIR/memory-hive" add researcher --role researcher > /dev/null

          # Seed: backtick citation, markdown-link citation, and a non-existent
          # backticked word that MUST be ignored (false-positive guard).
          # Using printf rather than heredoc to avoid YAML-block indentation
          # pitfalls (heredoc EOF must be flush-left in bash).
          {
            printf '\n## 2026-04-24\n'
            printf -- '- Paired with `reviewer` on the migration plan.\n'
            printf -- '- Read `git` history (no `git` silo — must NOT be a citation).\n'
            printf -- '- See [research notes](../researcher/log.md) for prior art.\n'
          } >> "$INSTALL_DIR/hive/agents/coder/log.md"

          # Frontmatter cites form (forward-compatible).
          {
            printf -- '---\n'
            printf 'date: 2026-04-24\n'
            printf 'cites: [coder]\n'
            printf -- '---\n\n'
            printf '# reviewer memory\n'
          } > "$INSTALL_DIR/hive/agents/reviewer/memory.md"

          # Run the new verb.
          sh "$INSTALL_DIR/memory-hive" citations | tee /tmp/mh-cit.out

          CIT="$INSTALL_DIR/hive/registry/CITATIONS.md"
          test -f "$CIT" || { echo "CITATIONS.md was not written"; exit 1; }

          # Backtick citation present.
          grep -q "| coder | reviewer | 1 |" "$CIT" || { echo "missing coder->reviewer edge"; cat "$CIT"; exit 1; }
          # Markdown-link citation present.
          grep -q "| coder | researcher | 1 |" "$CIT" || { echo "missing coder->researcher edge"; cat "$CIT"; exit 1; }
          # Frontmatter cites citation present.
          grep -q "| reviewer | coder | 1 |" "$CIT" || { echo "missing reviewer->coder edge"; cat "$CIT"; exit 1; }
          # False-positive guard: 'git' must NOT show up as a cited agent.
          ! grep -E '\| git \|' "$CIT" || { echo "false positive: git appeared as citation"; exit 1; }

          # `register` must also rebuild CITATIONS.md.
          rm -f "$CIT"
          sh "$INSTALL_DIR/memory-hive" register > /dev/null
          test -f "$CIT" || { echo "register did not rebuild CITATIONS.md"; exit 1; }
          grep -q "coder | reviewer" "$CIT" || { echo "register-rebuilt CITATIONS.md missing edge"; exit 1; }

          # Idempotent: a second run should produce identical bytes.
          sh "$INSTALL_DIR/memory-hive" citations > /dev/null
          sum1=$(cksum "$CIT" | awk '{print $1}')
          sh "$INSTALL_DIR/memory-hive" citations > /dev/null
          sum2=$(cksum "$CIT" | awk '{print $1}')
          [ "$sum1" = "$sum2" ] || { echo "citations not idempotent: $sum1 vs $sum2"; exit 1; }

          echo "Citations smoke OK"

      - name: CLI smoke — seed
        shell: bash
        run: |
          set -eu
          INSTALL_DIR="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL_DIR"
          export MEMORY_HIVE_SKIP_CLAUDE_MD=1
          export MEMORY_HIVE_REPO="$(pwd)"
          sh install.sh < /dev/null > /dev/null

          # Sleep so files seeded post-install are strictly newer than the
          # baseline marker (mh_tail / mh_stats filter by baseline mtime).
          sleep 2

          # 1. Default scenario: must succeed and write the expected files.
          sh "$INSTALL_DIR/memory-hive" seed | tee /tmp/mh-seed.out
          grep -q 'Now try:' /tmp/mh-seed.out || { echo "FAIL: seed missing next-steps"; exit 1; }

          for rel in \
              hive/agents/coder/log.md \
              hive/agents/coder/context.md \
              hive/agents/coder/memory.md \
              hive/agents/reviewer/log.md \
              hive/agents/researcher/log.md \
              hive/learnings/distilled/patterns.md \
              hive/learnings/distilled/wins.md \
              hive/learnings/distilled/mistakes.md \
              hive/curator/DECISIONS.md \
              hive/knowledge/PROJECTS.md; do
              if [ ! -s "$INSTALL_DIR/$rel" ]; then
                  echo "FAIL: $rel missing or empty after seed"
                  exit 1
              fi
          done

          # Raw learnings: filenames carry a substituted date prefix
          # (<YYYY-MM-DD>-<slug>.md) so any non-empty match is sufficient.
          ls "$INSTALL_DIR"/hive/learnings/raw/coder/*-parallel-test-isolation.md \
              >/dev/null 2>&1 \
              || { echo "FAIL: parallel-test-isolation seed missing"; exit 1; }
          ls "$INSTALL_DIR"/hive/learnings/raw/researcher/*-warmup-outside-window.md \
              >/dev/null 2>&1 \
              || { echo "FAIL: warmup-outside-window seed missing"; exit 1; }

          # Lint --strict must pass on freshly seeded data — the on-disk
          # filenames satisfy the YYYY-MM-DD-<slug>.md convention because
          # the seeder substitutes path markers along with body markers.
          sh "$INSTALL_DIR/memory-hive" lint --strict > /tmp/mh-seed-lint.out 2>&1 \
              || { echo "FAIL: seeded files fail lint --strict"; cat /tmp/mh-seed-lint.out; exit 1; }

          # No date-marker should leak through unsubstituted.
          if grep -r '__DAYS_AGO_' "$INSTALL_DIR/hive" > /tmp/mh-seed-leak.out 2>/dev/null; then
              echo "FAIL: unsubstituted __DAYS_AGO_N__ markers in seeded content"
              cat /tmp/mh-seed-leak.out
              exit 1
          fi

          # 2. tail / digest / confidence must produce non-trivial output.
          sh "$INSTALL_DIR/memory-hive" tail -n 5 > /tmp/mh-seed-tail.out
          # At least one raw learning surfaced.
          grep -q 'learnings/raw/' /tmp/mh-seed-tail.out || \
              { echo "FAIL: tail did not surface raw learnings"; cat /tmp/mh-seed-tail.out; exit 1; }

          sh "$INSTALL_DIR/memory-hive" digest --week > /tmp/mh-seed-digest.out
          # Digest names at least one of the seeded agents.
          grep -Eq '^(coder|reviewer|researcher) ' /tmp/mh-seed-digest.out || \
              { echo "FAIL: digest did not name any seeded agent"; cat /tmp/mh-seed-digest.out; exit 1; }

          sh "$INSTALL_DIR/memory-hive" confidence > /tmp/mh-seed-conf.out
          # Confidence shows clusters by title.
          grep -q 'confidence upgrades' /tmp/mh-seed-conf.out || \
              { echo "FAIL: confidence header missing"; cat /tmp/mh-seed-conf.out; exit 1; }
          # And surfaces at least one of the seeded titles.
          grep -q 'Test isolation across parallel workers' /tmp/mh-seed-conf.out || \
              grep -q 'Authz checks belong in middleware' /tmp/mh-seed-conf.out || \
              { echo "FAIL: confidence missing seeded titles"; cat /tmp/mh-seed-conf.out; exit 1; }

          # 3. Re-run without --force: must refuse with non-zero exit.
          set +e
          sh "$INSTALL_DIR/memory-hive" seed > /tmp/mh-seed-refuse.out 2>&1
          RC=$?
          set -e
          [ "$RC" -ne 0 ] || { echo "FAIL: second seed did not refuse"; cat /tmp/mh-seed-refuse.out; exit 1; }
          grep -q 'already has user content' /tmp/mh-seed-refuse.out || \
              { echo "FAIL: refuse message wrong"; cat /tmp/mh-seed-refuse.out; exit 1; }

          # 4. --force must succeed even on a populated hive.
          sh "$INSTALL_DIR/memory-hive" seed --force > /tmp/mh-seed-force.out
          grep -q 'Seeded scenario' /tmp/mh-seed-force.out || \
              { echo "FAIL: --force did not seed"; cat /tmp/mh-seed-force.out; exit 1; }

          # 5. --dry-run must not write to a fresh hive.
          INSTALL2="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$INSTALL2"
          sh install.sh < /dev/null > /dev/null
          test ! -d "$INSTALL2/hive/agents/coder"
          sh "$INSTALL2/memory-hive" seed --dry-run > /tmp/mh-seed-dry.out
          grep -q 'dry-run' /tmp/mh-seed-dry.out || \
              { echo "FAIL: --dry-run header missing"; cat /tmp/mh-seed-dry.out; exit 1; }
          test ! -d "$INSTALL2/hive/agents/coder" || \
              { echo "FAIL: --dry-run wrote a silo"; exit 1; }

          # 6. Bundled scenario flag accepts solo + large-team.
          for SCN in solo large-team; do
              D="$(mktemp -d)"
              export MEMORY_HIVE_DIR="$D"
              sh install.sh < /dev/null > /dev/null
              sh "$D/memory-hive" seed --scenario "$SCN" > /tmp/mh-seed-$SCN.out
              grep -q "Seeded scenario \"$SCN\"" /tmp/mh-seed-$SCN.out || \
                  { echo "FAIL: $SCN scenario did not seed"; cat /tmp/mh-seed-$SCN.out; exit 1; }
              # Each scenario writes at least one raw learning so confidence has data.
              find "$D/hive/learnings/raw" -type f -name '*.md' | head -1 | grep -q . || \
                  { echo "FAIL: $SCN scenario produced no raw learnings"; exit 1; }
          done

          # 7. Unknown scenario must fail with non-zero exit.
          D="$(mktemp -d)"
          export MEMORY_HIVE_DIR="$D"
          sh install.sh < /dev/null > /dev/null
          set +e
          sh "$D/memory-hive" seed --scenario does-not-exist > /tmp/mh-seed-bad.out 2>&1
          RC=$?
          set -e
          [ "$RC" -ne 0 ] || { echo "FAIL: unknown scenario did not exit non-zero"; exit 1; }

          # 8. Help text must mention seed.
          sh install.sh < /dev/null > /dev/null
          sh "$D/memory-hive" help | grep -q 'memory-hive seed' || \
              { echo "FAIL: help missing 'seed'"; exit 1; }

          echo "Seed smoke OK"
