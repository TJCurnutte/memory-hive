<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Memory Hive</title>
  <desc id="desc">Memory Hive wordmark matching the website logo: a rounded gold memory-core mark beside a clean sans-serif wordmark.</desc>
  <defs>
    <linearGradient id="mh-mark" x1="28" y1="28" x2="122" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d7a24a"/>
      <stop offset="0.48" stop-color="#fff3c6"/>
      <stop offset="1" stop-color="#5a3a17"/>
    </linearGradient>
    <filter id="mh-shadow" x="12" y="10" width="126" height="132" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#d7a24a" flood-opacity="0.34"/>
    </filter>
  </defs>

  <g filter="url(#mh-shadow)">
    <rect x="28" y="28" width="94" height="94" rx="30" fill="url(#mh-mark)"/>
    <rect x="28.75" y="28.75" width="92.5" height="92.5" rx="29.25" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
    <g transform="translate(72 54) skewX(-14)">
      <rect x="-17" y="0" width="7" height="52" rx="3.5" fill="#080706"/>
      <rect x="10" y="0" width="7" height="52" rx="3.5" fill="#080706"/>
    </g>
  </g>

  <text x="154" y="98"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="58"
        font-weight="800"
        letter-spacing="-1.8"
        fill="#fbfaf7">Memory Hive</text>
</svg>
