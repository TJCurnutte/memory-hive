<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" fill="none">
  <title>Memory Hive</title>
  <!--
    Memory Hive brand mark — dark-theme variant.
    Rendered on transparent background. The 3-cell honeycomb cluster on
    the left mirrors the nav brand mark; "Memory" is italic serif in
    warm near-white, "Hive" is bold sans in the amber accent.
    Fonts fall back cleanly: Georgia for serif, system-ui for sans.
  -->

  <!-- Honeycomb cluster (scaled 3x from the nav's 42x38 viewBox) -->
  <g transform="translate(30 44) scale(3)" stroke="#fbbf24" stroke-width="1.6" stroke-linejoin="round">
    <!-- Top cell: outline + light amber fill -->
    <polygon points="21,2 30,7.2 30,17.6 21,22.8 12,17.6 12,7.2" fill="#fbbf24" fill-opacity="0.18" />
    <!-- Bottom-left cell: outline only -->
    <polygon points="11,17 20,22.2 20,32.6 11,37.8 2,32.6 2,22.2" />
    <!-- Bottom-right cell: solid amber -->
    <polygon points="31,17 40,22.2 40,32.6 31,37.8 22,32.6 22,22.2" fill="#fbbf24" fill-opacity="0.9" />
  </g>

  <!-- Wordmark -->
  <!-- "Memory" — italic serif, warm off-white -->
  <text x="198" y="140"
        font-family="'Instrument Serif', 'EB Garamond', Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="400"
        font-size="110"
        letter-spacing="-1"
        fill="#f5f5f4">Memory</text>

  <!-- "Hive" — bold sans, amber accent -->
  <text x="545" y="140"
        font-family="'Inter', system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-weight="700"
        font-size="110"
        letter-spacing="-2"
        fill="#fbbf24">Hive</text>
</svg>
