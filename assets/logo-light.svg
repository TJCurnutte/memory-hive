<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 96" fill="none">
  <title>Memory Hive</title>
  <!--
    Light-theme wordmark. Sister to hive-swarm/assets/logo-light.svg —
    same 480×96 viewBox, same wordmark proportions, paired aesthetic.
    Honeycomb mark on left + italic-serif "Memory" + bold-sans "Hive"
    + teal accent dot at the end.

    Bug fix: previous version hardcoded x="545" for "Hive", which broke
    on GitHub because Instrument Serif isn't available there and the
    fallback font has different metrics, so "Memory" overflowed and
    overlapped "Hive". Switched to <tspan dx=...> for relative spacing
    that works regardless of which serif the renderer falls back to.
  -->

  <!-- Honeycomb cluster (3 cells: top-center + bottom-left + bottom-right) -->
  <g transform="translate(8 12)">
    <polygon points="22,2 42,2 52,18 42,34 22,34 12,18"
             stroke="#b45309" stroke-width="2" stroke-linejoin="round"
             fill="#b45309" fill-opacity="0.14" />
    <polygon points="2,30 22,30 32,46 22,62 2,62 -8,46"
             stroke="#0f766e" stroke-width="2" stroke-linejoin="round" />
    <polygon points="42,30 62,30 72,46 62,62 42,62 32,46"
             stroke="#0f766e" stroke-width="2" stroke-linejoin="round"
             fill="#0f766e" fill-opacity="0.14" />
    <circle cx="32" cy="18" r="2.5" fill="#b45309" />
    <circle cx="12" cy="46" r="2.5" fill="#0f766e" />
    <circle cx="52" cy="46" r="2.5" fill="#0f766e" />
  </g>

  <!-- Wordmark — single <text>, two <tspan>. dx="0.18em" gives
       a stable inter-word gap regardless of font metrics. -->
  <text x="96" y="62"
        font-family="'Instrument Serif', 'EB Garamond', Georgia, 'Times New Roman', serif"
        font-size="56"
        letter-spacing="-1"
        fill="#1c1917">
    <tspan font-style="italic" font-weight="400">Memory</tspan><tspan
        dx="0.18em"
        font-family="'Inter', system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-style="normal"
        font-weight="700"
        fill="#b45309">Hive</tspan>
  </text>

  <!-- Teal accent dot (placed conservatively after the wordmark). -->
  <circle cx="368" cy="55" r="4" fill="#0f766e" />
</svg>
