<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 96" fill="none">
  <title>Memory Hive</title>
  <!--
    Light-theme wordmark — matches the brand-mark in the site navbar
    (memoryhive.neural-forge.io). Top cell outlined + light-amber fill;
    bottom-left cell outlined; bottom-right cell solid amber. All in the
    amber accent. Plus italic-serif "Memory" + bold-sans "Hive" + a
    small teal accent dot at the end.

    Wordmark uses <tspan dx=...> for relative spacing so it renders
    correctly even when GitHub falls back from Instrument Serif to a
    different system serif with different metrics.
  -->

  <!-- Brand mark — single-color, mirrors site navbar exactly -->
  <g transform="translate(8 14) scale(1.85)" stroke="#b45309" stroke-width="1.6" stroke-linejoin="round">
    <polygon points="21,2 30,7.2 30,17.6 21,22.8 12,17.6 12,7.2"
             fill="#b45309" fill-opacity="0.16" />
    <polygon points="11,17 20,22.2 20,32.6 11,37.8 2,32.6 2,22.2" />
    <polygon points="31,17 40,22.2 40,32.6 31,37.8 22,32.6 22,22.2"
             fill="#b45309" fill-opacity="0.9" />
  </g>

  <!-- Wordmark — single <text>, two <tspan> with relative dx -->
  <text x="96" y="62"
        font-family="'Instrument Serif', 'EB Garamond', Georgia, 'Times New Roman', serif"
        font-size="56"
        letter-spacing="-1"
        fill="#1c1917">
    <tspan font-style="italic" font-weight="400">Memory</tspan><tspan
        dx="0.18em"
        font-family="'Inter', system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-style="normal"
        font-weight="700"
        fill="#b45309">Hive</tspan>
  </text>

  <!-- Teal accent dot — bridge color shared with hive-swarm. -->
  <circle cx="368" cy="55" r="4" fill="#0f766e" />
</svg>
